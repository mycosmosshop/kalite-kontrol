function drawDashTrend(canvas,days){
  const {ctx,w,h}=_setupCanvas(canvas); const muted=_cv('--muted'),line=_cv('--line');
  const padL=34,padR=12,padT=12,padB=40,pw=w-padL-padR,ph=h-padT-padB;
  const maxT=Math.max(1,...days.map(d=>d.total));
  const n=days.length, bw=Math.max(3,Math.min(34,pw/n-3));
  ctx.font='10px Segoe UI,sans-serif'; ctx.fillStyle=muted; ctx.strokeStyle=line;
  for(let k=0;k<=3;k++){ const v=Math.round(maxT*k/3), y=padT+(1-k/3)*ph; ctx.globalAlpha=.3; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); ctx.globalAlpha=1; ctx.textAlign='right'; ctx.textBaseline='middle'; ctx.fillText(String(v),padL-4,y); }
  const X=i=>padL+(n<=1?pw/2:(i/(n-1))*(pw-bw))+bw/2;
  days.forEach((d,i)=>{ const cx=X(i)-bw/2; const okH=(d.total-d.ret)/maxT*ph, retH=d.ret/maxT*ph;
    ctx.fillStyle='#22c55e'; ctx.fillRect(cx,padT+ph-okH,bw,okH);
    ctx.fillStyle='#ef4444'; ctx.fillRect(cx,padT+ph-okH-retH,bw,retH); });
  // her çubuğun altına tarih (dd.mm) — kalabalıksa -45° döndür, çok fazlaysa atlamalı
  ctx.fillStyle=muted; ctx.font='9px Segoe UI,sans-serif';
  const rotate=(pw/n)<40, step=n>22?Math.ceil(n/22):1;
  days.forEach((d,i)=>{ if(i%step!==0 && i!==n-1)return; const cx=X(i), lbl=String(fmtDate(d.date)).slice(0,5);
    ctx.save(); ctx.translate(cx, h-padB+5);
    if(rotate){ ctx.rotate(-Math.PI/4.2); ctx.textAlign='right'; ctx.textBaseline='middle'; }
    else { ctx.textAlign='center'; ctx.textBaseline='top'; }
    ctx.fillText(lbl,0,0); ctx.restore(); });
}

  // LeanSys bilgi BLOĞU — ⟦LS:key⟧ markeri + "Etiket: değer" satırları (modal bunu ayrı panele ayrıştırır).
  const notes=[
    '⟦LS:'+lsKey(r)+'⟧',

    'Makine: '+([r.makineGrubu,r.makine].filter(Boolean).join(' / ')||'-'),
    'Uygunsuzluk Türü: '+(r.uygunsuzlukTuru||'-'),
    'Hata Tipi: '+(r.hataTipi||'-'),
    'Hata Kaynağı: '+(r.hataKaynagi||'-'),
    'Birim: '+(r.birim||'-'),
    'İş Emri: '+(r.isEmriKodu||'-'),
    'LeanSys Kararı: '+(r.karar||'-'),
    'LeanSys Sonucu: '+(r.sonuc||'-')
  ].join('\n');
  return {
    ncr_no:ncrNo, source:'leansys',
    stock_code:r.stokKodu||r.yarimamulKodu||null,
    stock_name:r.stokAdi||r.yarimamulAdi||null,
    customer:r.cariAdi||null,
    detected_at: iso?(iso+'T00:00:00'):new Date().toISOString(),
    defect_desc: (tur?(tur+(tarif?' — ':'')):'')+tarif || 'LeanSys uygunsuzluk',
    qty_total: lsNum(r.partiHacmi)||lsNum(r.kontrolMiktar),
    qty_def: lsNum(r.hataliMiktar),
    decision: lsDecision(r.karar),
    status: closed?'closed':'open',
    severity: lsSeverity(r),
    closed_at: (closed&&kapIso)?(kapIso+'T00:00:00'):null,
    notes
  };
}
async function ncrPullLeansys(){
  if(!can('ncr')){ toast('Bu işlem için yetkin yok (Uygunsuzluk).','err'); return; }
  const code=($('#nclsCode')&&$('#nclsCode').value.trim())||'';
  const from=($('#nclsFrom')&&$('#nclsFrom').value)||'';
  const to=($('#nclsTo')&&$('#nclsTo').value)||'';
  const noRaw=($('#nclsNo')&&$('#nclsNo').value.trim())||'';
  const yil=(from&&from.slice(0,4))||'';   // U-kodunda yıl yoksa Başlangıç tarihinin yılı (yoksa bu yıl)
  const noList=lsParseNoList(noRaw, yil);                        // virgülle çoklu No → [{year,sira}…]
  const byNo = noList.length ? noList : null;
  // No modunda ajan ilgili YIL(lar)ı çeker (stok/tarih atlanır); aksi halde tarih aralığı
  const _years = byNo ? byNo.map(x=>Number(x.year)) : [];
  const aFrom = byNo ? (Math.min(..._years)+'-01-01') : from;
  const aTo   = byNo ? (Math.max(..._years)+'-12-31') : to;
  const box=$('#nclsResult'); if(box) box.innerHTML='<div class="empty" style="padding:14px">⏳ LeanSys tazeleniyor…</div>';
  const btn=$('#nclsBtn'); const _t=btn?btn.textContent:''; if(btn){btn.disabled=true;btn.textContent='⏳ Tazeleniyor…';}
  // 1) ajan: uygunsuzluk_records'ı bu pencereye tazele (LeanSys'e YALNIZCA SELECT)
  let res=null;
  try{ const r=await fetch('http://127.0.0.1:17777/uygunsuzluk?from='+encodeURIComponent(aFrom)+'&to='+encodeURIComponent(aTo),{mode:'cors'}); res=await r.json(); }catch(e){ res=null; }
  if(btn){btn.disabled=false;btn.textContent=_t;}
  if(!res) toast('LeanSys ajanı kapalı/erişilemedi — var olan ara tablo gösteriliyor. (LeanSys_Agent çalışmalı.)','err');
  else if(!res.ok) toast('LeanSys tazeleme başarısız: '+esc(res.error||'?'),'err');
  else toast('LeanSys uygunsuzluk ara tablosu tazelendi ('+(res.count||0)+' satır).','ok');
  // 2) Supabase ara tablodan oku + filtre (LeanSys'e dokunulmaz)
  const {data:rows,error}=await sbAnon.from('uygunsuzluk_records').select('*').limit(50000);
  if(error){ if(box)box.innerHTML=''; toast('Ara tablo okunamadı: '+esc(error.message),'err'); return; }
  let list=(rows||[]).slice(); const okundu=list.length;
  if(byNo){
    // UYGUNSUZLUK NO modu: çoklu No'dan herhangi biri eşleşirse al (seri=yıl + sıra); stok/tarih atlanır
    list=list.filter(r=>{ const ser=String(r.uygunsuzlukSeri||''); const sira=String(r.uygunsuzlukSira||'').trim();
      return byNo.some(p=> (!p.year||ser.includes(p.year)) && (!p.sira||sira===String(p.sira)) ); });
    list.sort((a,b)=>(lsParseDate(b.uygunsuzlukTarih)||'').localeCompare(lsParseDate(a.uygunsuzlukTarih)||''));
    const _lbl=byNo.map(p=>p.sira?(p.year+'/'+p.sira):('tüm '+p.year)).join(', ');
    toast('Uygunsuzluk No araması: '+okundu+' okundu · '+list.length+' eşleşti ('+_lbl+')',(list.length?'ok':'err'));
  } else {
    // STOK eşleşmesi ESNEK: boşluk/büyük-küçük duyarsız; tam eşit ya da biri diğerini içeriyorsa (ör. "700.0.444" → "700.0.444-2X")
    const _norm=s=>String(s||'').trim().toLowerCase().replace(/\s+/g,'');
    if(code){ const cl=_norm(code); list=list.filter(r=>{ const a=_norm(r.stokKodu), b=_norm(r.yarimamulKodu);
      return (a&&(a===cl||a.includes(cl)||cl.includes(a)))||(b&&(b===cl||b.includes(cl)||cl.includes(b))); }); }
    const kodSonra=list.length;
    if(from) list=list.filter(r=>{const d=lsParseDate(r.uygunsuzlukTarih);return d&&d>=from;});
    if(to)   list=list.filter(r=>{const d=lsParseDate(r.uygunsuzlukTarih);return d&&d<=to;});
    list.sort((a,b)=>(lsParseDate(b.uygunsuzlukTarih)||'').localeCompare(lsParseDate(a.uygunsuzlukTarih)||''));
    toast('Ara tablo: '+okundu+' kayıt · kod sonrası '+kodSonra+' · tarih sonrası '+list.length,(list.length?'ok':'err'));
  }
  // Aynı uygunsuzluk view'da birden çok stok-hareket satırı olarak gelebilir → lsKey ile TEK kayda indir
  { const _seen=new Set(); const _before=list.length; list=list.filter(r=>{ const k=lsKey(r); if(_seen.has(k))return false; _seen.add(k); return true; });
    if(list.length<_before) toast((_before-list.length)+' tekrarlı satır birleştirildi → '+list.length+' uygunsuzluk.','ok'); }
  // zaten içe aktarılmış LeanSys anahtarları (notes damgasından)
  const {data:exist}=await sb.from('ncrs').select('notes');
  const imported=new Set(); (exist||[]).forEach(n=>{const m=(n.notes||'').match(LS_MARK_RE); if(m)imported.add(m[1]);});
  LS_PULL={list,imported};
  renderLsPullTable();
}

async function ncrImportLeansys(selKeys){
  if(!can('ncr')){ toast('Bu işlem için yetkin yok (Uygunsuzluk).','err'); return; }
  const sel=(LS_PULL.list||[]).filter(r=>selKeys.has(lsKey(r)));
  if(!sel.length){ toast('Kayıt seçilmedi.','err'); return; }
  const yeniN=sel.filter(r=>!LS_PULL.imported.has(lsKey(r))).length, guncelN=sel.length-yeniN;
  if(!confirm(sel.length+' kayıt işlenecek: '+yeniN+' yeni NCR + '+guncelN+' güncelleme.\n(Güncellemede stok/cari/adet/karar/önem/durum/tanım LeanSys’ten tazelenir; elle girdiğin Sorumlu ve Termin KORUNUR.)\n(LeanSys’e dokunulmaz.)\nDevam?')) return;
  // mevcut NCR'lar: id+ncr_no+notes → LeanSys anahtarı eşleme; numara üretimi için ncr_no listesi
  let {data:allNcrs}=await sb.from('ncrs').select('id,ncr_no,notes'); allNcrs=allNcrs||[];
  const byKey={}; allNcrs.forEach(n=>{const m=(n.notes||'').match(LS_MARK_RE); if(m)byKey[m[1]]=n;});
  const numList=allNcrs.map(n=>({ncr_no:n.ncr_no}));
  let ins=0, upd=0, errN=0; const doneKeys=new Set();
  for(const r of sel){
    const key=lsKey(r); if(doneKeys.has(key)) continue; doneKeys.add(key);   // batch içi aynı uygunsuzluğu 2 kez işleme
    const ex=byKey[key];
    if(ex){   // GÜNCELLE — ncr_no, responsible, due_date, created_by'a dokunma (lsToNcr bunları döndürmez)
      const p=lsToNcr(r, ex.ncr_no); delete p.ncr_no; p.updated_at=new Date().toISOString();
      const exUser=lsSplitNotes(ex.notes).user;                 // kullanıcının elle yazdığı not korunur, LeanSys bloğu tazelenir
      p.notes=(exUser?exUser+'\n':'')+p.notes;
      const {error}=await sb.from('ncrs').update(p).eq('id',ex.id); error?errN++:upd++;
    } else {  // YENİ
      const no=nextNo('NCR',numList,'ncr_no'); numList.push({ncr_no:no});
      const p=lsToNcr(r,no); p.created_by=ME&&ME.id; p.updated_at=new Date().toISOString();
      const {error}=await sb.from('ncrs').insert(p); if(error){errN++;} else { ins++; byKey[key]={ncr_no:no,notes:p.notes}; }
    }
  }
  toast(ins+' yeni + '+upd+' güncellendi'+(errN?(' · '+errN+' hata'):'')+'.', errN?'err':'ok');
  renderNCR();
}

      qty_total:(prod.quantity!=null?prod.quantity:null), status:'open', severity:'medium', created_by:ME&&ME.id };
    const {error}=await sb.from('ncrs').insert(payload);
    if(!error) toast('⚠ Uygunsuzluk otomatik açıldı: '+ncrNo+' — «Uygunsuzluk» sekmesinden 8D işleyebilirsin.','ok');

async function openNCREdit(existing, fromRet, allNcrs, stockCat, cariList){

  let supplierList=[];
  if(isGiris){ try{ const {data:mk}=await sb.from('mal_kabul').select('cari_adi').not('cari_adi','is',null).limit(5000); supplierList=[...new Set((mk||[]).map(x=>x.cari_adi).filter(Boolean))].sort(); }catch(e){} }

    inp.value=n[key]??defaultVal??''; F[key]=inp;
    return el('div',{class:'field grow',style:'margin-bottom:8px'},el('label',{class:'lab'},lbl),inp);
  };
  // Genel
  const genHdr=el('div',{style:'font-weight:700;margin:10px 0 6px;color:var(--accent)'},'GENEL BİLGİ');
  m.append(genHdr);
  // Stok Kodu/Adı/Cari — hem manuel yaz hem listeden seç (datalist); kod seçilince ad otomatik dolar
  const dlS=el('datalist',{id:'ncrStockDL'}); stockCat.forEach(s=>dlS.append(el('option',{value:s.code},s.name||'')));
  const dlC=el('datalist',{id:'ncrCariDL'}); (isGiris?supplierList:cariList).forEach(c=>dlC.append(el('option',{value:c})));
  const scInp=el('input',{class:'inp',list:'ncrStockDL',placeholder:'700.0.454 (yaz veya seç)'}); scInp.value=n.stock_code??(fr.record?fr.record.stock_code:'')??''; F.stock_code=scInp;
  const snInp=el('input',{class:'inp',placeholder:'Stok adı'}); snInp.value=n.stock_name??(fr.record?fr.record.stock_name:'')??''; F.stock_name=snInp;
  const carInp=el('input',{class:'inp',list:'ncrCariDL',placeholder:(isGiris?'Tedarikçi (yaz veya seç)':'Müşteri (yaz veya seç)')}); carInp.value=n.customer??(isGiris?(girisCari||''):((fr.prod||{}).customer||''))??''; F.customer=carInp;
  scInp.oninput=()=>{ const hit=stockCat.find(s=>s.code===scInp.value.trim()); if(hit&&hit.name&&!snInp.value.trim())snInp.value=hit.name; };  // kod seçilince adı otomatik (ad boşsa)

    el('div',{class:'field grow'},el('label',{class:'lab'},'Durum'), (()=>{const s=el('select',{class:'inp'}); Object.entries(NCR_STATUS).forEach(([v,t])=>{const o=el('option',{value:v},t);if(v===(n.status||'open'))o.selected=true;s.append(o);}); F.status=s; return s;})()),
    el('div',{class:'field grow'},el('label',{class:'lab'},'Önem'), (()=>{const s=el('select',{class:'inp'}); [['low','🟢 Düşük'],['medium','🟡 Orta'],['high','🔴 Yüksek']].forEach(([v,t])=>{const o=el('option',{value:v},t);if(v===(n.severity||'medium'))o.selected=true;s.append(o);}); F.severity=s; return s;})())

  const _ls=lsSplitNotes(n.notes);
  const lsInputs=[];   // [[etiket, inputEl]] — kaydederken blok bunlardan yeniden kurulur
  if(_ls.fields.length){
    const grid=el('div',{style:'display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px 16px;padding:11px 13px;border:1px solid var(--border);border-radius:8px;background:var(--panel2);margin-bottom:8px'});
    _ls.fields.forEach(([lab,val])=>{
      const inp=el('input',{class:'inp',style:'font-size:12.5px;height:30px'}); inp.value=val; lsInputs.push([lab,inp]);
      grid.append(el('div',{},

    });

      grid);
  }
  m.append(fld('notes','Ek Notlar','',2));
  F.notes.value=_ls.user;   // Ek Notlar yalnız kullanıcının kendi notunu gösterir; LeanSys bloğu yukarıdaki panelde

// ---- sertifika satır yardımcıları (PROSES ölçüleri, düzenlenebilir) ----
function buildCertRows(recs, plan){
  const proses=(plan||[]).filter(it=>it.process_control!==false && it.active!==false);
  const recMap={};
  (recs||[]).forEach(r=>(r.vals||[]).forEach(v=>{
    const k=v.measure_name; if(!k)return;
    const g=recMap[k]||(recMap[k]={vals:[],ok:0,ret:0});
    (v.samples||[]).forEach(s=>{ if(s.value!=null&&s.value!==''){const n=Number(s.value); if(isFinite(n))g.vals.push(n);} if(s.ok===true)g.ok++; else if(s.ok===false)g.ret++; });
  }));
  return proses.map(it=>{
    const g=recMap[it.measure_name]||{vals:[],ok:0,ret:0};
    const isq=!!it.is_qualitative;
    const unit=it.unit||'';
    const lo=it.lower_limit, hi=it.upper_limit;
    const hedef=(it.target!=null&&it.target!=='')?(String(it.target)+(unit&&!isq?(' '+unit):'')):(isq?(it.nitel_hedef||''):'');
    const limit=isq?(it.nitel_hedef||''):((lo!=null&&lo!==''?lo:'…')+' ÷ '+(hi!=null&&hi!==''?hi:'…')+(unit?(' '+unit):''));
    const metot=it.method||'';
    let bulunan='', adet='';
    const hasRec=g.vals.length>0||g.ok>0||g.ret>0;
    if(hasRec){
      if(isq){ bulunan=(g.ok>0&&g.ret===0)?'UYGUN':(g.ret>0?'UYGUNSUZ':''); }
      else if(g.vals.length){ const mn=Math.min(...g.vals),mx=Math.max(...g.vals),av=g.vals.reduce((a,b)=>a+b,0)/g.vals.length; bulunan='Min '+mn.toFixed(3)+' · Maks '+mx.toFixed(3)+' · Ort '+av.toFixed(3); }
      adet=(g.ok+g.ret)||'';
    } else {
      // ölçüm kaydı yok → makul "uygun" varsayılan (kullanıcı değiştirebilir)
      if(isq){ bulunan='UYGUN'; }
      else {
        let def=null; const t=Number(it.target), a=Number(lo), b=Number(hi);
        if(it.target!=null&&it.target!==''&&isFinite(t)) def=t;
        else if(isFinite(a)&&isFinite(b)) def=(a+b)/2;
        else if(isFinite(a)) def=a; else if(isFinite(b)) def=b;
        if(def!=null) bulunan=String(parseFloat(def.toFixed(3)))+(unit?(' '+unit):'');
        else if(it.target!=null&&it.target!=='') bulunan=String(it.target)+(unit?(' '+unit):'');
      }
      adet=(it.sample_size!=null&&it.sample_size!=='')?it.sample_size:1;
    }
    return { name:it.measure_name||'', hedef, limit, metot, bulunan, adet, result:g.ret>0?'RET':'OK' };
  });
}
function certRowsFromExisting(c){
  const d=c.data||{};
  if(Array.isArray(d.rows)) return d.rows.map(r=>({name:r.name||'',hedef:r.hedef||'',limit:r.limit||'',metot:r.metot||'',bulunan:r.bulunan||'',adet:(r.adet??''),result:(String(r.result||'OK').toUpperCase()==='RET')?'RET':'OK'}));
  const sum=d.summary||{};
  return Object.values(sum).map(g=>{
    const isq=g.is_q;
    const hedef=g.target!=null?String(g.target)+(g.unit&&!isq?' '+g.unit:''):'';
    const limit=isq?(g.nitel||''):((g.lower!=null?g.lower:'…')+' ÷ '+(g.upper!=null?g.upper:'…')+(g.unit?' '+g.unit:''));
    let bulunan='';
    if(isq) bulunan=(g.ok>0&&g.ret===0)?'UYGUN':(g.ret>0?'UYGUNSUZ':'');
    else if((g.vals||[]).length){const mn=Math.min(...g.vals),mx=Math.max(...g.vals),av=g.vals.reduce((a,b)=>a+b,0)/g.vals.length;bulunan='Min '+mn.toFixed(3)+' · Maks '+mx.toFixed(3)+' · Ort '+av.toFixed(3);}
    return {name:g.name||'',hedef,limit,metot:'',bulunan,adet:((g.ok+g.ret))||'',result:g.ret>0?'RET':'OK'};
  });
}

  m.append(el('div',{style:'display:flex;align-items:center;gap:10px;margin:14px 0 4px;flex-wrap:wrap'},
    el('label',{class:'lab',style:'margin:0;font-size:13px'},'Kontrol / Ölçüm Sonuçları (PROSES) — düzenlenebilir'),
    el('div',{class:'grow'}),
    el('button',{class:'btn sm sec',style:'flex:0',onclick:()=>loadResults()},'↻ Plandan Yeniden Getir'),
    el('button',{class:'btn sm sec',style:'flex:0',onclick:()=>{ ROWS.push({name:'',hedef:'',limit:'',metot:'',bulunan:'',adet:'',result:'OK'}); renderCertRowsTable(resWrap,ROWS); }},'＋ Satır Ekle')
  ));
  m.append(resWrap); m.append(status);
  async function loadResults(){
    const pid=prodSel.value;
    if(!pid){ ROWS=[]; renderCertRowsTable(resWrap,ROWS); status.textContent='Önce üretim seç → PROSES ölçüleri buraya gelir.'; return; }
    const p=(prods||[]).find(x=>String(x.id)===String(pid)); if(!p)return;
    status.textContent='Plan + ölçüm sonuçları getiriliyor…';
    const [{data:recs},{data:plan}]=await Promise.all([
      sb.from('control_records').select('*').eq('production_id',p.id),
      sb.from('control_plan_items').select('*').eq('stock_code',p.stock_code)
    ]);
    ROWS = buildCertRows(recs, plan);
    renderCertRowsTable(resWrap, ROWS);
    status.textContent = ROWS.length?(ROWS.length+' PROSES ölçüsü getirildi. Düzenle/sil veya satır ekle.'):'Bu stok planında PROSES ölçüsü yok — elle satır ekleyebilirsin.';
  }
  prodSel.addEventListener('change',loadResults);
  renderCertRowsTable(resWrap, ROWS);
  status.textContent = editing ? (ROWS.length+' kayıtlı satır. Düzenle/sil; üretimi değiştirirsen plandan yeniden gelir.') : 'Önce üretim seç → PROSES ölçüleri buraya gelir.';
  m.append(el('div',{style:'display:flex;gap:8px;justify-content:flex-end;margin-top:14px'},
    el('button',{class:'btn sm sec',onclick:()=>root.innerHTML=''},'İptal'),
    el('button',{class:'btn sm',onclick:async()=>{
      const pid=prodSel.value; if(!pid){toast('Üretim seç.','err');return;}
      const p=(prods||[]).find(x=>String(x.id)===String(pid)); if(!p){toast('Üretim bulunamadı.','err');return;}
      const cleanRows=ROWS.filter(r=>(r.name||'').trim()!=='').map(r=>({name:(r.name||'').trim(),hedef:(r.hedef||'').trim(),limit:(r.limit||'').trim(),metot:(r.metot||'').trim(),bulunan:(r.bulunan||'').trim(),adet:(r.adet===''||r.adet==null)?'':(isFinite(Number(r.adet))?Number(r.adet):r.adet),result:(String(r.result||'OK').toUpperCase()==='RET')?'RET':'OK'}));
      const {data:hdrRows}=await sb.from('control_plan_headers').select('*').eq('stock_code',p.stock_code);
      const hdr=(hdrRows||[])[0]||{};
      const data={ work_order:p.work_order, op_no:p.op_no, machine_name:p.machine_name, prod_date:p.prod_date||p.start_time, rows:cleanRows, total_records:cleanRows.length };
      const payload={cert_no:certNo, cert_type:typeSel.value, stock_code:p.stock_code, stock_name:p.stock_name, customer:p.customer, production_id:p.id, lot_no:lotInp.value.trim()||null, issue_date:issueInp.value||isoDateLocal(new Date()), quantity:p.quantity, unit:p.unit, doc_no:hdr.doc_no||null, rev_no:hdr.rev_no||null, header:hdr, data, notes:notesInp.value.trim()||null };
      let saved;
      if(editing){
        const {data:up,error}=await sb.from('certificates').update(payload).eq('id',existing.id).select().maybeSingle();
        if(error){toast(esc(error.message),'err');return;}
        saved=up||Object.assign({},existing,payload); toast('Sertifika güncellendi.','ok');
      } else {
        payload.created_by=ME&&ME.id;
        const {data:ins,error}=await sb.from('certificates').insert(payload).select().maybeSingle();
        if(error){toast(esc(error.message),'err');return;}
        saved=ins||payload; toast('Sertifika '+certNo+' oluşturuldu.','ok');
      }
      root.innerHTML=''; renderCert(); openCertPrint(saved);
    }},editing?'💾 Kaydet & PDF':'💾 Oluştur & PDF')
  ));
  bg.append(m); root.innerHTML=''; root.append(bg);
}
function openCertPrint(c){
  const root=$('#modalRoot');
  const bg=el('div',{class:'modal-bg',onclick:e=>{if(e.target===bg)root.innerHTML='';}});
  const m=el('div',{class:'modal',style:'position:relative;max-width:580px'});
  m.append(el('button',{class:'close-x',onclick:()=>root.innerHTML=''},'×'));
  m.append(el('h3',{},'🖨 Sertifika Yazdır — '+esc(c.cert_no)));
  const today=isoDateLocal(new Date());
  const dInp=el('input',{type:'date',class:'inp'}); dInp.value=c.issue_date?String(c.issue_date).slice(0,10):today;
  const lotInp=el('input',{class:'inp',placeholder:'örn. LOT-2026-001'}); lotInp.value=c.lot_no||'';
  const langSel=el('select',{class:'inp'}); [['tr','🇹🇷 Türkçe'],['en','🇬🇧 English']].forEach(([v,t])=>{const o=el('option',{value:v},t); langSel.append(o);});
  m.append(el('div',{class:'row'},
    el('div',{class:'field grow'},el('label',{class:'lab'},'Düzenleme Tarihi'),dInp),
    el('div',{class:'field',style:'flex:0;min-width:150px'},el('label',{class:'lab'},'Dil / Language'),langSel),
    el('div',{class:'field',style:'flex:0;min-width:150px'},el('label',{class:'lab'},'Lot No'),lotInp)));
  let irsNo, irsDate;
  if(c.cert_type==='CoA'){
    irsNo=el('input',{class:'inp',placeholder:'örn. 123456'});
    irsDate=el('input',{type:'date',class:'inp'});
    m.append(el('div',{class:'row'},
      el('div',{class:'field grow'},el('label',{class:'lab'},'İrsaliye No'),irsNo),
      el('div',{class:'field',style:'flex:0;min-width:160px'},el('label',{class:'lab'},'İrsaliye Tarihi'),irsDate)));
  }
  m.append(el('div',{style:'display:flex;gap:8px;justify-content:flex-end;margin-top:12px'},
    el('button',{class:'btn sm sec',style:'flex:0',onclick:()=>root.innerHTML=''},'İptal'),
    el('button',{class:'btn sm',style:'flex:0',onclick:async()=>{
      const lot=lotInp.value.trim()||null; const iss=dInp.value||today; c.lot_no=lot; c.issue_date=iss;
      if(c.id){ const {error}=await sb.from('certificates').update({lot_no:lot, issue_date:iss}).eq('id',c.id); if(error){toast(esc(error.message),'err');return;} renderCert(); }
      const opts={issueDate:iss, lotNo:lot, lang:langSel.value};
      if(c.cert_type==='CoA'){opts.irsaliyeNo=irsNo.value;opts.irsaliyeDate=irsDate.value;}
      root.innerHTML=''; printCert(c,opts);
    }},'🖨 Yazdır')));
  bg.append(m); root.append(bg);
}
function printCert(c, opts){ opts=opts||{};
  const w=window.open('','_blank','width=900,height=1100'); if(!w)return toast('Pop-up engellenmiş.','err');
  const d=c.data||{};
  const issD=opts.issueDate||c.issue_date;                 // yazdırırken seçilen düzenleme tarihi
  const irsNo=(opts.irsaliyeNo||'').trim(), irsDate=opts.irsaliyeDate||'';   // CoA için irsaliye
  const lotNo=(opts.lotNo!=null&&opts.lotNo!=='')?opts.lotNo:(c.lot_no||'');  // yazdırırken girilen lot
  const EN=(opts.lang==='en');                                                // komple İngilizce seçeneği
  const T=EN?{certNo:'Certificate No',date:'Date',docNo:'Document No',rev:'Revision',customer:'Customer',workOrder:'Work Order',stockCode:'Product Code',productName:'Product Name',prodDate:'Production Date',operation:'Operation',lotNo:'Lot No',qty:'Quantity',dispNo:'Dispatch Note No',dispDate:'Dispatch Date',overallOk:'✔ ALL RESULTS PASS',overallRet:'✘ FAIL — NONCONFORMITY FOUND',resultsH:'Measurement / Inspection Results',thChar:'Inspection Characteristic',thTarget:'Target',thLimit:'Limit / Spec',thMethod:'Method / Standard',thFound:'Measured Value / Result',thQty:'Qty',thResult:'Result',noResults:'No measurement results found.',notes:'Notes',planDef:'Control Plan',summaryH:'Conformity Summary',declConfOk:'We hereby declare that the product/lot specified above CONFORMS to the relevant control plan and technical specifications.',declConfRet:'Note: one or more characteristics of the product/lot specified above do NOT conform to the specified requirements.',footFn:(dt,dd)=>`This certificate has been issued within the scope of ${dt}, on ${dd}, by Sanifoam Endüstri ve Tüketim Ürünleri San. Tic. A.Ş.`}
    :{certNo:'Sertifika No',date:'Tarih',docNo:'Doküman No',rev:'Revizyon',customer:'Müşteri / Cari',workOrder:'İş Emri',stockCode:'Stok Kodu',productName:'Ürün Adı',prodDate:'Üretim Tarihi',operation:'Operasyon',lotNo:'Lot No',qty:'Miktar',dispNo:'İrsaliye No',dispDate:'İrsaliye Tarihi',overallOk:'✔ TÜM SONUÇLAR UYGUN',overallRet:'✘ UYGUNSUZLUK VAR',resultsH:'Ölçüm / Kontrol Sonuçları',thChar:'Kontrol Özelliği',thTarget:'Hedef',thLimit:'Limit / Spec',thMethod:'Metot / Standart',thFound:'Bulunan Değer / Sonuç',thQty:'Adet',thResult:'Sonuç',noResults:'Ölçüm sonucu bulunamadı.',notes:'Notlar',planDef:'Kontrol Planı',summaryH:'Uygunluk Özeti',declConfOk:'İşbu belge ile yukarıda belirtilen ürün/parti, ilgili kontrol planı ve teknik spesifikasyonlara UYGUNDUR.',declConfRet:'Not: Yukarıda belirtilen ürün/partinin bir veya daha fazla özelliği belirtilen şartlara UYGUN DEĞİLDİR.',footFn:(dt,dd)=>`Bu sertifika ${dt} kapsamında, ${dd} tarihinde Sanifoam Endüstri ve Tüketim Ürünleri San. Tic. A.Ş. tarafından düzenlenmiştir.`};
  const tcell=s=>{ s=String(s==null?'':s); if(EN){ s=s.replace(/UYGUNSUZ/g,'FAIL').replace(/UYGUN/g,'PASS').replace(/Maks/g,'Max').replace(/Ort/g,'Avg'); } return s; };
  const isCoA=(c.cert_type==='CoA');                                          // CoA=analiz(değerli), CoC=uygunluk(beyan)
  const rowObjs = Array.isArray(d.rows) ? d.rows : certRowsFromExisting(c);   // yeni satır modeli (eski özet otomatik dönüşür)
  const overallOK = rowObjs.every(r=>String(r.result||'').toUpperCase()!=='RET');
  const rows=rowObjs.map(r=>{
    const isRet=String(r.result||'').toUpperCase()==='RET';
    const st=isRet?'<span class="pill ret">RET</span>':'<span class="pill ok">OK</span>';
    return isCoA
      ? `<tr><td>${esc(r.name||'')}</td><td>${esc(r.hedef||'-')}</td><td>${esc(r.limit||'-')}</td><td>${esc(r.metot||'-')}</td><td>${esc(tcell(r.bulunan||'-'))}</td><td style="text-align:center">${esc(r.adet!=null&&r.adet!==''?String(r.adet):'-')}</td><td style="text-align:center">${st}</td></tr>`
      : `<tr><td>${esc(r.name||'')}</td><td>${esc(r.hedef||'-')}</td><td>${esc(r.limit||'-')}</td><td>${esc(r.metot||'-')}</td><td style="text-align:center">${st}</td></tr>`;
  }).join('');
  const theadHtml=isCoA
    ? `<th>${esc(T.thChar)}</th><th>${esc(T.thTarget)}</th><th>${esc(T.thLimit)}</th><th>${esc(T.thMethod)}</th><th>${esc(T.thFound)}</th><th>${esc(T.thQty)}</th><th>${esc(T.thResult)}</th>`
    : `<th>${esc(T.thChar)}</th><th>${esc(T.thTarget)}</th><th>${esc(T.thLimit)}</th><th>${esc(T.thMethod)}</th><th>${esc(T.thResult)}</th>`;
  const colspan=isCoA?7:5;
  const title=(c.cert_type==='CoA')?'CERTIFICATE OF ANALYSIS (CoA)':'CERTIFICATE OF CONFORMITY (CoC)';
  const titleTr=(c.cert_type==='CoA')?'ANALİZ SERTİFİKASI':'UYGUNLUK SERTİFİKASI';
  const titleMain=EN?title:titleTr, titleSub=EN?'':title;
  const logoUrl=location.href.replace(/[#?].*$/,'').replace(/[^/]*$/,'')+'SanifoamLogo-Transparent.png';
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>${esc(c.cert_no)} — ${esc(title)}</title>
<style>
@page{size:A4;margin:14mm}
body{font-family:Segoe UI,Arial,sans-serif;color:#111;font-size:12px;margin:0}

</style></head><body>

  <div class="l"><img src="${logoUrl}" alt="Sanifoam" onerror="this.style.display='none'"></div>

    ${c.doc_no?'<tr><td>'+esc(T.docNo)+'</td><td>'+esc(c.doc_no)+'</td></tr>':''}

// ====================== ADMIN (KULLANICILAR) ======================
async function renderAdmin(){
  const root=$('#tab-admin');
  if(!PROFILE.is_admin){root.innerHTML='<div class="card"><div class="empty">Yetkin yok.</div></div>';return;}
  root.innerHTML='<div class="card"><div class="empty">Yükleniyor…</div></div>';
  const {data}=await sb.from('profiles').select('*').order('created_at',{ascending:false});
  const users=data||[];
  root.innerHTML='';
  const tb=el('table');
  tb.append(el('thead',{},el('tr',{},...['E-posta','Durum','Rol','Yetkiler','İşlem'].map(h=>el('th',{},h)))));
  const body=el('tbody');
  const SUPER='volkanpekatik@gmail.com';
  const amSuper=(ME.email||'').toLowerCase()===SUPER;
  users.forEach(u=>{
    const actions=el('td',{});
    const isSelf=u.id===ME.id;
    const isSuperRow=(u.email||'').toLowerCase()===SUPER;
    const isProtected = isSelf || (isSuperRow && !amSuper);   // sadece kendini + süper-admin'i (başkalarından) koru
    if(isProtected){
      actions.append(el('span',{class:'pill gray'}, isSelf?'Sen — korumalı':'Süper admin — korumalı'));
    }else{
      if(!u.approved)actions.append(el('button',{class:'btn sm',onclick:()=>setUser(u.id,{approved:true})},'Onayla'));
      else actions.append(el('button',{class:'btn sm sec',onclick:()=>setUser(u.id,{approved:false})},'Onayı Kaldır'));
      if(u.is_admin) actions.append(el('button',{class:'btn sm sec',style:'margin-left:6px',onclick:()=>{if(confirm(u.email+' yöneticilikten çıkarılsın mı?'))setUser(u.id,{is_admin:false});}},'Admin’i Kaldır'));
      else actions.append(el('button',{class:'btn sm sec',style:'margin-left:6px',onclick:()=>{if(confirm(u.email+' admin yapılsın mı?'))setUser(u.id,{is_admin:true,approved:true});}},'Admin Yap'));
    }
    body.append(el('tr',{},
      el('td',{},el('div',{},u.email),el('div',{style:'color:var(--muted);font-size:11px'},fmtDate(u.created_at))),
      el('td',{},el('span',{class:'pill '+(u.approved?'ok':'gray')},u.approved?'Onaylı':'Bekliyor')),
      el('td',{},u.is_admin?'Yönetici':'Kullanıcı'),
      permsCell(u),
      actions
    ));
  });
  tb.append(body);
  root.append(el('div',{class:'card'},el('h3',{},'Kullanıcı Yönetimi'),
    el('p',{style:'color:var(--muted);margin:-6px 0 12px;font-size:12px'},'Her kullanıcıya yetkileri tek tek aç/kapa: Giriş (kontrol kaydı oluşturma) · Düzenle (kayıt düzeltme) · Sil · Plan (kontrol planı düzenleme) · İçe Aktar (üretim Excel) · Otomatik (rastgele uygun kayıt üretme) · Dashboard (kalite istatistik panosunu görme) · Uygunsuzluk (NCR/8D yönetimi) · Sertifika (CoC/CoA oluşturma). Admin tüm yetkilere sahiptir.'),
    el('div',{class:'tbl-wrap'},tb)));
}
const PERMS=[['enter','Giriş'],['edit','Düzenle'],['delete','Sil'],['plan','Plan'],['import','İçe Aktar'],['auto','Otomatik'],['dashboard','Dashboard'],['ncr','Uygunsuzluk'],['cert','Sertifika']];
function permsCell(u){
  const td=el('td',{});
  if(u.is_admin){ td.append(el('span',{class:'pill ok'},'Tümü (admin)')); return td; }
  const wrap=el('div',{style:'display:flex;gap:10px;flex-wrap:wrap'});
  PERMS.forEach(([k,lbl])=>{
    const cb=el('input',{type:'checkbox'}); cb.checked=!!u['can_'+k];
    cb.disabled=!u.approved;   // onaylı değilse yetki verilemez
    cb.onchange=()=>setUser(u.id,{['can_'+k]:cb.checked});
    wrap.append(el('label',{style:'display:inline-flex;align-items:center;gap:4px;font-size:12px;cursor:pointer'+(u.approved?'':';opacity:.5')},cb,lbl));
  });
  td.append(wrap); return td;
}
async function setUser(id,patch){
  const {error}=await sb.from('profiles').update(patch).eq('id',id);
  if(error){toast(esc(error.message),'err');return;}
  toast('Güncellendi.','ok'); renderAdmin();
}
