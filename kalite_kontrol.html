}
function _setupCanvas(c){ const dpr=window.devicePixelRatio||1, w=c.clientWidth||c.parentElement.clientWidth||600, h=parseFloat(c.style.height)||260;
  c.width=Math.round(w*dpr); c.height=Math.round(h*dpr); const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,w,h); return {ctx,w,h}; }
function _cv(n){ return getComputedStyle(document.body).getPropertyValue(n).trim()||'#888'; }
// grafik noktalarına gelince tarih+değer gösteren ipucu
function _chartTip(){ let t=document.getElementById('_chartTip'); if(!t){ t=document.createElement('div'); t.id='_chartTip'; t.style.cssText='position:fixed;z-index:9999;background:#0b1220;color:#fff;padding:6px 9px;border-radius:7px;font-size:12px;line-height:1.35;pointer-events:none;display:none;box-shadow:0 6px 18px rgba(0,0,0,.45);white-space:nowrap;border:1px solid #334155'; document.body.appendChild(t); } return t; }
function attachHover(canvas, fmt){
  const tip=_chartTip(); canvas.style.cursor='crosshair';
  canvas.onmousemove=e=>{ const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top, pts=canvas._hover||[];
    let best=null,bd=1e9; for(const p of pts){ const d=(p.x-mx)*(p.x-mx)+(p.y-my)*(p.y-my); if(d<bd){bd=d;best=p;} }
    if(best&&bd<=625){ tip.innerHTML=fmt(best); tip.style.display='block'; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px'; } else tip.style.display='none'; };
  canvas.onmouseleave=()=>{ tip.style.display='none'; };
}
function drawIChart(canvas,xs,times,o){
  const {ctx,w,h}=_setupCanvas(canvas); const muted=_cv('--muted'),line=_cv('--line'),accent=_cv('--accent');
  const padL=54,padR=64,padT=14,padB=30,pw=w-padL-padR,ph=h-padT-padB;
  const cand=[...xs]; [o.UCL,o.LCL,o.USL,o.LSL,o.TGT].forEach(v=>{if(v!=null&&isFinite(v))cand.push(v);});
  let yMin=Math.min(...cand),yMax=Math.max(...cand); if(yMin===yMax){yMin-=1;yMax+=1;} const p=(yMax-yMin)*0.08; yMin-=p; yMax+=p;
  const X=i=>padL+(xs.length<=1?pw/2:(i/(xs.length-1))*pw), Y=v=>padT+(1-(v-yMin)/(yMax-yMin))*ph;
  ctx.font='11px Segoe UI,sans-serif'; ctx.textBaseline='middle';
  ctx.strokeStyle=line; ctx.fillStyle=muted; ctx.lineWidth=1;
  for(let k=0;k<=4;k++){ const v=yMin+(yMax-yMin)*k/4,y=Y(v); ctx.globalAlpha=.3; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); ctx.globalAlpha=1; ctx.textAlign='right'; ctx.fillText(v.toFixed(2),padL-6,y); }
  const hline=(v,color,dash,label)=>{ if(v==null||!isFinite(v))return; const y=Y(v); ctx.save(); ctx.strokeStyle=color; ctx.setLineDash(dash); ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); ctx.restore(); ctx.fillStyle=color; ctx.textAlign='left'; ctx.fillText(label,w-padR+4,y); };
  hline(o.USL,'#f59e0b',[6,4],'USL'); hline(o.LSL,'#f59e0b',[6,4],'LSL'); hline(o.UCL,'#ef4444',[5,4],'UCL'); hline(o.LCL,'#ef4444',[5,4],'LCL'); hline(o.TGT,'#38bdf8',[2,3],'Hedef'); hline(o.CL,'#22c55e',[],o.clLabel||'X̄');
  ctx.strokeStyle=accent; ctx.lineWidth=1.5; ctx.setLineDash([]); ctx.beginPath(); xs.forEach((v,i)=>{ const x=X(i),y=Y(v); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }); ctx.stroke();
  const PT=[];
  xs.forEach((v,i)=>{ const x=X(i),y=Y(v),bad=o.ooc&&o.ooc[i]; ctx.fillStyle=bad?'#ef4444':accent; ctx.beginPath(); ctx.arc(x,y,bad?4:3,0,7); ctx.fill(); if(bad){ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();} PT.push({x,y,v,t:times[i],bad}); });
  ctx.fillStyle=muted; ctx.textBaseline='top'; const idxs=[0,Math.floor((xs.length-1)/2),xs.length-1];
  idxs.forEach((i,k)=>{ ctx.textAlign=k===0?'left':(k===2?'right':'center'); ctx.fillText(fmtDate(times[i]),Math.min(Math.max(X(i),padL),w-padR),h-padB+8); });
  canvas._hover=PT; attachHover(canvas, p=>`<b>${esc(fmtDT(p.t)||'')}</b><br>${o.clLabel==='X̿'?'Altgrup ort.':'Ölçüm'}: ${_fmtN(p.v,3)}${o.unit?(' '+esc(o.unit)):''}${p.bad?'<br><span style="color:#fca5a5">⚠ kontrol dışı</span>':''}`);
}
// genel dağılım grafiği (MR / R / S) — o={cl,ucl,lcl,label}
function drawDisp(canvas,vals,times,o){
  const {ctx,w,h}=_setupCanvas(canvas); const muted=_cv('--muted'),line=_cv('--line'),accent=_cv('--accent');
  const padL=54,padR=64,padT=12,padB=22,pw=w-padL-padR,ph=h-padT-padB;
  const ucl=o.ucl, lcl=o.lcl||0; let yMax=Math.max(ucl,...vals,0.0001)*1.12; const yMin=0;
  const X=i=>padL+(vals.length<=1?pw/2:(i/(vals.length-1))*pw), Y=v=>padT+(1-(v-yMin)/(yMax-yMin))*ph;
  ctx.font='11px Segoe UI,sans-serif'; ctx.textBaseline='middle'; ctx.strokeStyle=line; ctx.fillStyle=muted;
  for(let k=0;k<=3;k++){ const v=yMin+(yMax-yMin)*k/3,y=Y(v); ctx.globalAlpha=.3; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); ctx.globalAlpha=1; ctx.textAlign='right'; ctx.fillText(v.toFixed(2),padL-6,y); }
  const hline=(v,color,dash,label)=>{ if(v==null||!isFinite(v))return; const y=Y(v); ctx.save(); ctx.strokeStyle=color; ctx.setLineDash(dash); ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); ctx.restore(); ctx.fillStyle=color; ctx.textAlign='left'; ctx.fillText(label,w-padR+4,y); };
  hline(ucl,'#ef4444',[5,4],'UCL'); if(lcl>0)hline(lcl,'#ef4444',[5,4],'LCL'); hline(o.cl,'#22c55e',[],o.label||'CL');
  ctx.strokeStyle=accent; ctx.lineWidth=1.5; ctx.setLineDash([]); ctx.beginPath(); vals.forEach((v,i)=>{ const x=X(i),y=Y(v); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }); ctx.stroke();
  const PT=[];
  vals.forEach((v,i)=>{ const x=X(i),y=Y(v),bad=v>ucl||v<lcl; ctx.fillStyle=bad?'#ef4444':accent; ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fill(); if(bad){ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();} PT.push({x,y,v,t:times&&times[i],bad}); });
  if(times&&times.length){ ctx.fillStyle=muted; ctx.textBaseline='top'; const idxs=[0,Math.floor((vals.length-1)/2),vals.length-1];
    idxs.forEach((i,k)=>{ ctx.textAlign=k===0?'left':(k===2?'right':'center'); ctx.fillText(fmtDate(times[i]),Math.min(Math.max(X(i),padL),w-padR),h-padB+6); }); }
  canvas._hover=PT; attachHover(canvas, p=>`<b>${esc(fmtDT(p.t)||'')}</b><br>${esc(o.label||'')}: ${_fmtN(p.v,4)}${p.bad?'<br><span style="color:#fca5a5">⚠ kontrol dışı</span>':''}`);
}
function drawHist(canvas,xs,o){
  const {ctx,w,h}=_setupCanvas(canvas); const muted=_cv('--muted'),accent=_cv('--accent'),txt=_cv('--txt');
  const padL=44,padR=20,padT=26,padB=28,pw=w-padL-padR,ph=h-padT-padB;
  let lo=Math.min(...xs),hi=Math.max(...xs);
  if(o.LSL!=null)lo=Math.min(lo,o.LSL); if(o.USL!=null)hi=Math.max(hi,o.USL); if(o.TGT!=null){lo=Math.min(lo,o.TGT);hi=Math.max(hi,o.TGT);}
  if(lo===hi){lo-=1;hi+=1;} const span=hi-lo; lo-=span*0.06; hi+=span*0.06;
  const nb=Math.min(14,Math.max(6,Math.round(Math.sqrt(xs.length)))), bw=(hi-lo)/nb, bins=new Array(nb).fill(0);
  xs.forEach(x=>{ let b=Math.floor((x-lo)/bw); if(b<0)b=0; if(b>=nb)b=nb-1; bins[b]++; });
  const maxC=Math.max(...bins,1);
  // eğri tepe değerlerini de hesaba kat → kırpılma olmaz
  const peak=sig=> (sig>0)? (1/(sig*Math.sqrt(2*Math.PI)))*xs.length*bw : 0;
  const yTop=Math.max(maxC, peak(o.sWithin)||0, peak(o.sOverall)||0)*1.1;
  const X=v=>padL+((v-lo)/(hi-lo))*pw, Yb=c=>padT+(1-c/yTop)*ph;
  ctx.fillStyle=accent; ctx.globalAlpha=.5; bins.forEach((c,i)=>{ if(!c)return; const x0=X(lo+i*bw),x1=X(lo+(i+1)*bw),y=Yb(c); ctx.fillRect(x0+1,y,Math.max(1,x1-x0-2),padT+ph-y); }); ctx.globalAlpha=1;
  // normal eğriler: Overall (kesik, metin rengi) + Within (düz kırmızı) — Minitab tarzı
  const curve=(sig,color,dash)=>{ if(!(sig>0))return; ctx.strokeStyle=color; ctx.lineWidth=2; ctx.setLineDash(dash); ctx.beginPath();
    for(let px=0;px<=pw;px+=2){ const xv=lo+(px/pw)*(hi-lo), dens=Math.exp(-((xv-o.mean)**2)/(2*sig*sig))/(sig*Math.sqrt(2*Math.PI)), y=Yb(dens*xs.length*bw); px?ctx.lineTo(padL+px,y):ctx.moveTo(padL+px,y); } ctx.stroke(); ctx.setLineDash([]); };
  curve(o.sOverall, txt, [6,4]);   // Overall: kesik
  curve(o.sWithin, '#ef4444', []); // Within: düz kırmızı
  const vline=(v,color,dash,label)=>{ if(v==null||!isFinite(v))return; const x=X(v); ctx.save(); ctx.strokeStyle=color; ctx.setLineDash(dash); ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(x,padT); ctx.lineTo(x,padT+ph); ctx.stroke(); ctx.restore(); ctx.fillStyle=color; ctx.font='11px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(label,x,padT-2); };
  vline(o.LSL,'#f59e0b',[6,4],'LSL'); vline(o.USL,'#f59e0b',[6,4],'USL'); vline(o.TGT,'#38bdf8',[2,3],'Hedef'); vline(o.mean,'#22c55e',[],'X̄');
  // efsane (sol üst)
  ctx.textAlign='left'; ctx.textBaseline='top'; ctx.font='11px Segoe UI';
  ctx.fillStyle='#ef4444'; ctx.fillText('▬ Within (σ içsel)',padL,4);
  ctx.fillStyle=txt; ctx.fillText('┄ Overall (σ genel)',padL+118,4);
  // x ekseni
  ctx.fillStyle=muted; ctx.textBaseline='top';
  for(let k=0;k<=4;k++){ const v=lo+(hi-lo)*k/4,x=X(v); ctx.textAlign=k===0?'left':(k===4?'right':'center'); ctx.fillText(v.toFixed(2),x,h-padB+8); }
}
function defsCard(){
  const d=el('details',{class:'defs'});
  d.append(el('summary',{},'📘 İstatistiksel terimlerin tanımları ve yorumlanması'));
  d.append(el('div',{style:'margin-top:10px;font-size:13px;line-height:1.6',html:`
    <p><b>Kontrol grafiği (Control Chart)</b>: Ölçümlerin zamana göre değişimini süreç ortalaması (X̄) ve ±3σ kontrol limitleri (UCL/LCL) ile gösterir. Limit dışına çıkan noktalar süreçte <i>özel bir neden</i> olduğunu işaret eder (kırmızı). Kontrol limitleri <u>süreçten</u> hesaplanır; <b>spec limitleri (USL/LSL)</b> ise müşteri/çizim toleransıdır — ikisi farklıdır.</p>
    <p><b>Cp</b> = (USL − LSL) / (6σ<sub>içsel</sub>): Sürecin <i>potansiyel</i> yeterliliği — dağılımın tolerans bandına sığıp sığmadığı (ortalamanın kaymasını dikkate almaz).</p>
    <p><b>Cpk</b> = min(USL − X̄, X̄ − LSL) / (3σ<sub>içsel</sub>): <i>Gerçek</i> yeterlilik — ortalamanın merkezden kaymasını da hesaba katar. σ<sub>içsel</sub>, ardışık ölçüm farklarından (MR̄/1.128) tahmin edilir.</p>
    <p><b>Pp / Ppk</b>: Cp/Cpk ile aynı formüller, ancak <b>genel standart sapma</b> (tüm verinin σ'sı) kullanılır. Cp/Cpk «kısa dönem / yetenek», Pp/Ppk «uzun dönem / performans» olarak yorumlanır.</p>
    <table>
      <thead><tr><th>İndeks değeri</th><th>Yorum</th><th>Yaklaşık hata oranı</th></tr></thead>
      <tbody>
        <tr><td>≥ 1.67</td><td style="color:#22c55e">Mükemmel</td><td>≈ 0.6 PPM</td></tr>
        <tr><td>1.33 – 1.67</td><td style="color:#22c55e">Yeterli (genel hedef ≥ 1.33)</td><td>≈ 63 PPM</td></tr>
        <tr><td>1.00 – 1.33</td><td style="color:#f59e0b">Sınırda — iyileştirme gerek</td><td>≈ 2.700 PPM</td></tr>
        <tr><td>&lt; 1.00</td><td style="color:#f87171">Yetersiz — süreç tolerans dışı üretir</td><td>&gt; 2.700 PPM</td></tr>
      </tbody>
    </table>
    <p style="color:var(--muted)"><b>PPM</b>: Milyonda kusur tahmini (normal dağılım, genel σ). <b>Histogram</b>: ölçümlerin dağılım şekli; çan eğrisine yakınlık normalliği, spec çizgilerine taşma kusur riskini gösterir.</p>
  `}));
  return d;
}

// ====================== ADMIN (KULLANICILAR) ======================
async function renderAdmin(){
  const root=$('#tab-admin');
  if(!PROFILE.is_admin){root.innerHTML='<div class="card"><div class="empty">Yetkin yok.</div></div>';return;}
  root.innerHTML='<div class="card"><div class="empty">Yükleniyor…</div></div>';
  const {data}=await sb.from('profiles').select('*').order('created_at',{ascending:false});
  const users=data||[];
  root.innerHTML='';
  const tb=el('table');
  tb.append(el('thead',{},el('tr',{},...['E-posta','Durum','Rol','Yetkiler','İşlem'].map(h=>el('th',{},h)))));
  const body=el('tbody');
  const SUPER='volkanpekatik@gmail.com';
  const amSuper=(ME.email||'').toLowerCase()===SUPER;
  users.forEach(u=>{
    const actions=el('td',{});
    const isSelf=u.id===ME.id;
    const isSuperRow=(u.email||'').toLowerCase()===SUPER;
    const isProtected = isSelf || (isSuperRow && !amSuper);   // sadece kendini + süper-admin'i (başkalarından) koru
    if(isProtected){
      actions.append(el('span',{class:'pill gray'}, isSelf?'Sen — korumalı':'Süper admin — korumalı'));
    }else{
      if(!u.approved)actions.append(el('button',{class:'btn sm',onclick:()=>setUser(u.id,{approved:true})},'Onayla'));
      else actions.append(el('button',{class:'btn sm sec',onclick:()=>setUser(u.id,{approved:false})},'Onayı Kaldır'));
      if(u.is_admin) actions.append(el('button',{class:'btn sm sec',style:'margin-left:6px',onclick:()=>{if(confirm(u.email+' yöneticilikten çıkarılsın mı?'))setUser(u.id,{is_admin:false});}},'Admin’i Kaldır'));
      else actions.append(el('button',{class:'btn sm sec',style:'margin-left:6px',onclick:()=>{if(confirm(u.email+' admin yapılsın mı?'))setUser(u.id,{is_admin:true,approved:true});}},'Admin Yap'));
    }
    body.append(el('tr',{},
      el('td',{},el('div',{},u.email),el('div',{style:'color:var(--muted);font-size:11px'},fmtDate(u.created_at))),
      el('td',{},el('span',{class:'pill '+(u.approved?'ok':'gray')},u.approved?'Onaylı':'Bekliyor')),
      el('td',{},u.is_admin?'Yönetici':'Kullanıcı'),
      permsCell(u),
      actions
    ));
  });
  tb.append(body);
  root.append(el('div',{class:'card'},el('h3',{},'Kullanıcı Yönetimi'),
    el('p',{style:'color:var(--muted);margin:-6px 0 12px;font-size:12px'},'Her kullanıcıya yetkileri tek tek aç/kapa: Giriş (kontrol kaydı oluşturma) · Düzenle (kayıt düzeltme) · Sil · Plan (kontrol planı düzenleme) · İçe Aktar (üretim Excel) · Otomatik (rastgele uygun kayıt üretme). Admin tüm yetkilere sahiptir.'),
    el('div',{class:'tbl-wrap'},tb)));
}
const PERMS=[['enter','Giriş'],['edit','Düzenle'],['delete','Sil'],['plan','Plan'],['import','İçe Aktar'],['auto','Otomatik']];
function permsCell(u){
  const td=el('td',{});
  if(u.is_admin){ td.append(el('span',{class:'pill ok'},'Tümü (admin)')); return td; }
  const wrap=el('div',{style:'display:flex;gap:10px;flex-wrap:wrap'});
  PERMS.forEach(([k,lbl])=>{
    const cb=el('input',{type:'checkbox'}); cb.checked=!!u['can_'+k];
    cb.disabled=!u.approved;   // onaylı değilse yetki verilemez
    cb.onchange=()=>setUser(u.id,{['can_'+k]:cb.checked});
    wrap.append(el('label',{style:'display:inline-flex;align-items:center;gap:4px;font-size:12px;cursor:pointer'+(u.approved?'':';opacity:.5')},cb,lbl));
  });
  td.append(wrap); return td;
}
async function setUser(id,patch){
  const {error}=await sb.from('profiles').update(patch).eq('id',id);
  if(error){toast(esc(error.message),'err');return;}
  toast('Güncellendi.','ok'); renderAdmin();
}
