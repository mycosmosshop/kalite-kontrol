<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kalite Kontrol Sistemi</title>
<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#15294d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kalite Kontrol">
<meta name="application-name" content="Kalite Kontrol">
<!-- favicon (sekme): yazısız, sadece kumpas -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3">
<link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png?v=3">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#243449; --line:#334155;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#2563eb; --accent2:#1d4ed8;
    --ok:#16a34a; --ret:#dc2626; --warn:#d97706;
  }
  body.light{
    --bg:#eef2f6; --panel:#ffffff; --panel2:#f1f5f9; --line:#cbd5e1;
    --txt:#0f172a; --muted:#5b6b7f; --accent:#2563eb; --accent2:#1d4ed8;
    --ok:#16a34a; --ret:#dc2626; --warn:#b45309;
  }
  body.light th{background:var(--panel)}
  .theme-btn{width:38px;height:34px;padding:0;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:17px;line-height:1;flex:0 0 auto}
  /* gizli otomatik araç: ok tutamacı; SADECE tıklayınca açılır (hover yok) */
  .autozone{position:relative;display:inline-flex;flex:0 0 auto}
  .autozone .autozone-handle{display:inline-flex;align-items:center;justify-content:center;width:36px;height:32px;color:var(--txt);border:1px solid var(--line);background:var(--panel2);border-radius:8px;font-size:16px;cursor:pointer;user-select:none}
  .autozone .auto-btn{display:none;position:absolute;top:36px;right:0;white-space:nowrap;z-index:6;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .autozone.open .auto-btn{display:inline-block}
  .autozone.open .autozone-handle{border-color:var(--accent);color:var(--accent)}
  .autozone .auto-menu{display:none;position:absolute;top:36px;right:0;flex-direction:column;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px;box-shadow:0 6px 18px rgba(0,0,0,.4);z-index:7;white-space:nowrap;min-width:200px}
  .autozone.open .auto-menu{display:flex}
  .autozone .auto-menu .btn{justify-content:flex-start}
  .card.collapsed{padding:6px 18px}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  button{cursor:pointer;font-family:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}
  .hidden{display:none!important}
  .brand-logo{height:30px;width:auto;vertical-align:middle;margin-right:10px;border-radius:4px}
  .brand-logo-auth{display:block;max-width:210px;width:80%;margin:0 auto 14px;border-radius:6px}


  /* AUTH */
  #auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .auth-card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:32px;width:100%;max-width:380px}
  .auth-card h1{margin:0 0 4px;font-size:22px}
  .auth-card p.sub{margin:0 0 22px;color:var(--muted);font-size:13px}
  .field{margin-bottom:14px}
  .field label{display:block;margin-bottom:6px;color:var(--muted);font-size:12px}
  .field input{width:100%;padding:11px 12px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)}
  .btn{padding:11px 16px;border:none;border-radius:9px;background:var(--accent);color:#fff;font-weight:600;width:100%}
  .btn:hover{background:var(--accent2)}
  .btn.sec{background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
  .btn.sm{width:auto;padding:7px 13px;font-size:13px}
  .btn.danger{background:var(--ret)}
  .link{background:none;border:none;color:var(--accent);text-decoration:underline;font-size:13px;padding:0;margin-top:14px}
  .msg{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px}
  .msg.err{background:#451a1a;color:#fca5a5;border:1px solid #7f1d1d}
  .msg.ok{background:#14321f;color:#86efac;border:1px solid #166534}
  .msg.info{background:#1e293b;color:#93c5fd;border:1px solid #1e3a8a}

  /* APP */
  header.top{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  header.top h2{margin:0;font-size:17px;white-space:nowrap}
  header.top .sp{flex:1}
  .who{color:var(--muted);font-size:12px;text-align:right;line-height:1.3}
  nav.tabs{display:flex;gap:4px;padding:0 12px;background:var(--panel);border-bottom:1px solid var(--line);overflow-x:auto;position:sticky;top:57px;z-index:19}
  nav.tabs button{padding:12px 16px;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-weight:600;white-space:nowrap}
  nav.tabs button.active{color:var(--txt);border-bottom-color:var(--accent)}
  main{padding:18px;max-width:1600px;margin:0 auto}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px}
  .card h3{margin:0 0 14px;font-size:16px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .row .field{margin-bottom:0}
  .grow{flex:1;min-width:160px}
  label.lab{display:block;margin-bottom:5px;color:var(--muted);font-size:12px}
  input.inp,select.inp,textarea.inp{width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px 9px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle}
  .cell-inp{padding:5px 7px;font-size:13px;border-radius:6px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);max-width:230px}
  .cell-inp:focus{outline:none;border-color:var(--accent)}
  /* Ölçü No kutusu: rakamlar kırpılmasın (spinner okları gizli) */
  input.olcu-inp{-moz-appearance:textfield;appearance:textfield}
  input.olcu-inp::-webkit-outer-spin-button,input.olcu-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;background:var(--panel)}
  tr:hover td{background:var(--panel2)}
  .tbl-wrap{overflow-x:auto;max-height:65vh;overflow-y:auto;border:1px solid var(--line);border-radius:10px}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.ok{background:#14321f;color:#86efac}
  .pill.ret{background:#451a1a;color:#fca5a5}
  .pill.gray{background:var(--panel2);color:var(--muted)}
  .pill.seri{background:#1e3a5f;color:#93c5fd}
  .pill.proses{background:#3b2f12;color:#fcd34d}
  .pill.son{background:#2d1b4e;color:#c4b5fd}
  .empty{text-align:center;color:var(--muted);padding:40px 10px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .stat{display:inline-flex;flex-direction:column;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 16px;min-width:110px}
  .stat b{font-size:22px}
  .stat span{color:var(--muted);font-size:12px}
  /* çoklu-seçim (cari vb.) */
  .msel-wrap{position:relative;display:block}
  .msel-btn{cursor:pointer;text-align:left;width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:14px;font-family:inherit;line-height:1.5;display:flex;justify-content:space-between;align-items:center;gap:6px}
  .msel-lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1 1 auto}
  .msel-panel{position:absolute;z-index:40;top:100%;left:0;margin-top:3px;background:var(--panel);border:1px solid var(--accent);border-radius:8px;max-height:280px;overflow-y:auto;overflow-x:hidden;width:300px;max-width:88vw;box-shadow:0 10px 28px rgba(0,0,0,.4);padding:5px}
  .msel-opt{display:flex;align-items:center;padding:7px 11px;font-size:13px;cursor:pointer;white-space:normal;line-height:1.35;border-radius:6px}
  .msel-opt:hover{background:var(--panel2)}
  .msel-opt input{flex:0 0 auto;margin:0 11px 0 0;width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
  .msel-opt span{flex:1 1 auto;word-break:break-word}
  .msel-head{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:3px 9px 7px;border-bottom:1px solid var(--line);margin-bottom:4px;font-size:11px}
  .msel-head a{color:var(--accent);cursor:pointer;font-weight:600}
  /* DASHBOARD */
  .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px}
  .dpanel{border:1px solid var(--line);border-radius:12px;background:var(--panel);overflow:hidden}
  .dpanel-h{padding:10px 14px;font-weight:700;font-size:13px;border-bottom:1px solid var(--line);background:var(--panel2)}
  .dpanel .dwrap{max-height:300px;overflow-y:auto}
  .dpanel table{font-size:12.5px;width:100%;border-collapse:collapse}
  .dpanel td,.dpanel th{padding:6px 9px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
  .dpanel th{font-size:11px;color:var(--muted);text-transform:uppercase;position:sticky;top:0;background:var(--panel)}
  .dpanel tr:last-child td{border-bottom:none}
  .rettrack{display:inline-block;width:54px;height:8px;background:var(--panel2);border-radius:5px;overflow:hidden;vertical-align:middle;margin-right:7px}
  .rettrack i{display:block;height:100%;background:var(--ret);border-radius:5px}
  .dpct{font-variant-numeric:tabular-nums;font-weight:700}
  .dempty{padding:18px;text-align:center;color:var(--muted);font-size:12px}
  /* SPC aksiyon/CAPA not kartı */
  .note-bg{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.25)}
  .note-card{position:fixed;width:330px;max-width:94vw;max-height:88vh;overflow-y:auto;background:var(--panel);border:1px solid var(--accent);border-radius:12px;padding:14px 16px;box-shadow:0 12px 34px rgba(0,0,0,.45);z-index:61}
  .note-card .note-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
  .note-card .note-h b{font-size:14px}
  .note-card .note-x{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;padding:0 2px}
  .note-card textarea.inp,.note-card input.inp,.note-card select.inp{width:100%}
  /* kayıt modalı üst bilgi (etiketli iki sütun) */
  .kk-meta{display:grid;grid-template-columns:1fr 1fr;gap:7px 28px;margin:4px 0 16px;padding:13px 16px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;font-size:13.5px}
  .kk-meta-item{line-height:1.4}
  .kk-meta-l{color:var(--muted)}
  .kk-meta-item b{color:var(--txt);font-weight:700}
  @media(max-width:600px){ .kk-meta{grid-template-columns:1fr;gap:6px} }
  /* SPC istatistik */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .scard{border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--panel2);position:relative;overflow:hidden}
  .scard .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
  .scard .val{font-size:26px;font-weight:800;line-height:1.1}
  .scard .sub{font-size:11px;color:var(--muted);margin-top:3px}
  .scard.cap-exc{border-color:#15803d;background:linear-gradient(180deg,rgba(22,163,74,.16),transparent)}
  .scard.cap-good{border-color:#16a34a}
  .scard.cap-mid{border-color:#d97706;background:linear-gradient(180deg,rgba(217,119,6,.14),transparent)}
  .scard.cap-bad{border-color:#dc2626;background:linear-gradient(180deg,rgba(220,38,38,.16),transparent)}
  .scard.cap-exc .val{color:#22c55e}.scard.cap-good .val{color:#22c55e}.scard.cap-mid .val{color:#f59e0b}.scard.cap-bad .val{color:#f87171}
  .chart-card canvas{width:100%;display:block;background:transparent}
  .chart-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:12px;color:var(--muted)}
  .chart-legend i{display:inline-block;width:16px;height:0;border-top-width:3px;border-top-style:solid;vertical-align:middle;margin-right:5px}
  /* grafik panosu (chart altı stat şeridi) */
  .statstrip{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .statstrip .si{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 12px;min-width:90px}
  .statstrip .si.clk{cursor:pointer}
  .statstrip .si .si-top b{display:block;font-size:16px;font-weight:800;color:var(--txt);font-variant-numeric:tabular-nums}
  .statstrip .si .si-top span{font-size:11px;color:var(--muted)}
  .statstrip .si.clk .si-top:hover b{color:var(--accent)}
  .statstrip .si.good .si-top b{color:#22c55e}.statstrip .si.mid .si-top b{color:#f59e0b}.statstrip .si.bad .si-top b{color:#f87171}
  .si-calc{margin-top:7px;font-size:11px;color:var(--txt);font-family:Consolas,'Courier New',monospace;line-height:1.45;max-width:300px;white-space:normal;border-top:1px dashed var(--line);padding-top:6px}
  /* Minitab yeterlilik paneli */
  .mtab{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-top:14px}
  .mtab-sec{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .mtab-title{background:var(--panel2);padding:8px 12px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:1px solid var(--line)}
  .mrow{border-bottom:1px solid var(--line)}
  .mrow:last-child{border-bottom:none}
  .mrow-top{display:flex;align-items:center;gap:8px;padding:7px 12px}
  .mrow-top>span:first-child{flex:1;color:var(--muted);font-size:13px}
  .mrow-top b{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
  .mrow.clk .mrow-top{cursor:pointer}
  .mrow.clk .mrow-top:hover{background:var(--panel2)}
  .mrow-caret{color:var(--muted);font-size:10px}
  .mrow-calc{padding:9px 12px;background:var(--panel2);font-size:12px;line-height:1.5;color:var(--txt);border-top:1px dashed var(--line);font-family:Consolas,'Courier New',monospace;word-break:break-word}
  .mrow.good b{color:#22c55e}.mrow.mid b{color:#f59e0b}.mrow.bad b{color:#f87171}
  details.defs{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 14px}
  details.defs summary{cursor:pointer;font-weight:700;color:var(--txt)}
  details.defs table{margin-top:10px}
  details.defs td,details.defs th{font-size:12px}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;padding:14px;z-index:50;overflow-y:auto}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;width:100%;max-width:1000px;margin:auto}
  .modal h3{margin:0 0 4px}
  .modal .meta{color:var(--muted);font-size:13px;margin-bottom:16px}
  .close-x{position:absolute;top:14px;right:18px;background:none;border:none;color:var(--muted);font-size:24px}
  .ctrl-item{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--panel2)}
  .ctrl-item .head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .ctrl-item .nm{font-weight:700}
  .ctrl-item .det{color:var(--muted);font-size:12px}
  .okret{display:flex;gap:6px}
  .okret button{padding:8px 16px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:700}
  .okret.sm button{padding:5px 11px;font-size:12px}
  /* kayan OK/RET toggle (LeanSys görünümü) */
  .tgl{position:relative;display:inline-block;width:62px;height:26px;border-radius:4px;border:none;cursor:pointer;vertical-align:middle;transition:background .15s}
  .tgl.ok{background:var(--ok)} .tgl.ret{background:var(--ret)}
  .tgl:disabled{cursor:default}
  .tgl .knob{position:absolute;top:3px;height:20px;width:20px;border-radius:2px;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .tgl.ok .knob{left:39px} .tgl.ret .knob{left:3px}
  .tgl .lbl{position:absolute;top:5px;font-size:11px;font-weight:800;color:#fff}
  .tgl.ok .lbl{left:9px} .tgl.ret .lbl{right:9px}
  .okret button.ok.on{background:var(--ok);color:#fff;border-color:var(--ok)}
  .okret button.ret.on{background:var(--ret);color:#fff;border-color:var(--ret)}
  /* ---------- RESPONSIVE (tablet & telefon) ---------- */
  @media(max-width:900px){
    body{font-size:13px}
    main{padding:12px}
    header.top{gap:8px;padding:10px 12px}
    header.top h2{font-size:15px}
    .who{font-size:11px}
    .brand-logo{height:24px;margin-right:6px}
    nav.tabs button{padding:10px 11px;font-size:13px}
    .card{padding:13px}
    .modal{padding:16px}
    .modal-bg{padding:8px}
    .stat b{font-size:18px}
    th,td{padding:7px 7px}
    .row>.field,.toolbar>.field{min-width:120px!important}
    .tbl-wrap{max-height:none}
  }
  @media(max-width:600px){
    header.top{flex-wrap:wrap;row-gap:6px}
    header.top .sp{display:none}
    header.top .who{order:6;text-align:left;flex:1 1 100%}
    nav.tabs{position:static;top:auto}
    nav.tabs button{padding:9px 9px;font-size:12.5px}
    .card{padding:11px;border-radius:10px}
    .modal{padding:13px;border-radius:12px}
    .modal-bg{padding:5px}
    .row,.toolbar{gap:8px}
    .row>*,.toolbar>.field{flex:1 1 100%!important;min-width:0!important}
    .toolbar>.stat{flex:1 1 auto!important}
    .field input,.inp,select.inp,textarea.inp{width:100%}
    table{font-size:12px}
    th,td{padding:6px 6px}
    .btn{padding:10px 12px}
    .btn.sm{padding:8px 11px}
    h3{font-size:16px}
    .auth-card{padding:24px 18px}
  }
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth">

function applyTheme(t){

}

// ====================== HELPERS ======================
const $ = s => document.querySelector(s);
const el = (tag, props={}, ...kids) => {
  const e = document.createElement(tag);
  for(const k in props){
    if(k==='class') e.className=props[k];
    else if(k==='html') e.innerHTML=props[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2),props[k]);
    else if(props[k]===false||props[k]==null) {/* boolean attr: atla (disabled:undefined gibi) */}
    else e.setAttribute(k,props[k]===true?'':props[k]);
  }
  kids.flat().forEach(c=>e.append(c?.nodeType?c:document.createTextNode(c??'')));
  return e;
};
const esc = s => (s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtDate = d => { if(!d) return ''; const m=String(d).match(/^(\d{4})-(\d{2})-(\d{2})/); return m? `${m[3]}.${m[2]}.${m[1]}` : new Date(d).toLocaleDateString('tr-TR'); };  // tarih metnini saat-dilimi BAĞIMSIZ göster
const fmtDT = d => d? new Date(d).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
const fmtTime = d => d? new Date(d).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}):'';
// LeanSys üretim saatleri (start_time/end_time) Supabase'e saat-dilimsiz (naive) yazılıp UTC sanıldığı için
// yerel gösterimde +3 kayıyordu. Bu fonksiyon değeri UTC olarak okur = orijinal Türkiye duvar-saati (kayma yok).
const fmtTimeWall = d => d? new Date(d).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'}):'';
const toLocalInput = t => { if(!t) return ''; const d=new Date(t); if(isNaN(d))return''; const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; };  // ISO → datetime-local (yerel)
// Giriş kalite kontrol zamanı: irsaliye TARİHİ (gün) + rastgele saat 08:01–17:30 (yerel). İrsaliye tarihinde saat olmadığı için.
function girisCtrlLocal(dateStr){ const d=String(dateStr||'').slice(0,10); if(!/^\d{4}-\d{2}-\d{2}$/.test(d)) return null; const m=481+Math.floor(Math.random()*(1050-481+1)); const p=n=>String(n).padStart(2,'0'); return `${d}T${p(Math.floor(m/60))}:${p(m%60)}`; }  // 481=08:01 .. 1050=17:30 (dk)
function girisCtrlISO(dateStr){ const l=girisCtrlLocal(dateStr); return l? new Date(l).toISOString() : null; }
const commaFmt = v => (v==null||v==='')?'' : String(v).replace('.',',');   // ondalık GÖSTER: nokta→virgül
const parseNum = v => Number(String(v==null?'':v).replace(',','.'));        // sayıya ÇEVİR: virgül→nokta (kıyas/saklama)
function toast(msg, type='ok'){
  const t = el('div',{class:'msg '+type, html:msg});
  Object.assign(t.style,{position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',zIndex:999,boxShadow:'0 6px 20px rgba(0,0,0,.4)',maxWidth:'90%'});
  document.body.append(t); setTimeout(()=>t.remove(),3500);
}
function authMsg(msg,type='err'){ $('#authMsg').innerHTML = msg?`<div class="msg ${type}">${msg}</div>`:''; }

function goFullscreen(){ const el=document.documentElement; const fn=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen; if(fn&&!document.fullscreenElement){ try{ fn.call(el); }catch(e){} } }
function exitFullscreen(){ const fn=document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen; if(fn&&document.fullscreenElement){ try{ fn.call(document); }catch(e){} } }
function toggleFullscreen(){ (document.fullscreenElement?exitFullscreen:goFullscreen)(); }
const _fsBtn=$('#fsBtn'); if(_fsBtn) _fsBtn.onclick=toggleFullscreen;
document.addEventListener('fullscreenchange',()=>{ if(_fsBtn) _fsBtn.textContent=document.fullscreenElement?'🗗':'⛶'; });

// ---- PWA: service worker + "Uygulamayı Yükle" (PC + tablet + telefon) ----
if('serviceWorker' in navigator){
  // YENİ SÜRÜM: otomatik reload ETME (çalışırken seni sekmeden atmasın). Sadece bilgilendir; kullanıcı uygun olunca yeniler.
  const _hadController = !!navigator.serviceWorker.controller;   // ilk kurulumda haber verme, sadece GÜNCELLEMEde
  let _swNotified=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(_swNotified || !_hadController) return; _swNotified=true;
    try{ toast('🔄 Yeni sürüm hazır. İşin bitince sayfayı yenile (Ctrl+R) — kaldığın sekmeye döner.','ok'); }catch(e){}
  });
  window.addEventListener('load',()=>{
    // updateViaCache:'none' → sw.js HER ZAMAN HTTP cache ATLANARAK çekilir (GitHub Pages 10 dk cache'i SW güncellemesini geciktirmesin)
    navigator.serviceWorker.register('sw.js',{updateViaCache:'none'}).then(reg=>{
      reg.update();                                  // her açılışta güncelleme kontrolü
      setInterval(()=>{ try{reg.update();}catch(e){} }, 5*60*1000);  // 5 dk'da bir güncelleme kontrolü
    }).catch(()=>{});
  });
}

function showInstallBanner(){
  if(_isStandalone || document.getElementById('installBanner')) return;
  const b=el('div',{id:'installBanner',style:'position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--accent);border-radius:14px;padding:11px 14px;box-shadow:0 14px 40px rgba(0,0,0,.55);max-width:94vw'});
  b.append(el('img',{src:'kk-icon-192.png',alt:'',style:'width:42px;height:42px;border-radius:10px;flex:0 0 auto'}));
  b.append(el('div',{style:'display:flex;flex-direction:column;min-width:0'}, el('b',{style:'font-size:14px'},'Uygulamayı yükle'), el('span',{style:'font-size:12px;color:var(--muted)'},'Masaüstüne/ana ekrana ekle — app gibi açılır')));
  b.append(el('button',{class:'btn sm',style:'flex:0 0 auto',onclick:async()=>{
    if(_deferredInstall){ _deferredInstall.prompt(); let c; try{c=await _deferredInstall.userChoice;}catch(_){}; _deferredInstall=null; if(c&&c.outcome==='accepted'){ if(_installBtn)_installBtn.style.display='none'; } b.remove(); }
    else { b.remove(); openInstallHelp(); }
  }},'📲 Yükle'));
  b.append(el('button',{class:'theme-btn',style:'flex:0 0 auto',title:'Kapat',onclick:()=>b.remove()},'✕'));
  document.body.appendChild(b);
}
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); _deferredInstall=e; if(_installBtn&&!_isStandalone) _installBtn.style.display=''; showInstallBanner(); });
window.addEventListener('appinstalled',()=>{ _deferredInstall=null; const bn=document.getElementById('installBanner'); if(bn)bn.remove(); if(_installBtn)_installBtn.style.display='none'; toast('✓ Uygulama yüklendi — artık simgesinden açabilirsin.','ok'); });
if(_installBtn) _installBtn.onclick=async()=>{
  if(_deferredInstall){
    _deferredInstall.prompt();
    let choice; try{ choice=await _deferredInstall.userChoice; }catch(_){}
    _deferredInstall=null;
    if(choice&&choice.outcome==='accepted'){ _installBtn.style.display='none'; }
    else { openInstallHelp(); }   // reddetti → buton görünür kalsın + elle adımlar
    return;
  }
  openInstallHelp();   // hazır prompt yok (reddedildi / iOS / destek yok) → adımları göster
};
function openInstallHelp(){
  const ua=navigator.userAgent;
  const isIOS=/iphone|ipad|ipod/i.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  const isAndroid=/android/i.test(ua);
  const isEdge=/edg/i.test(ua);
  let title, steps, note;
  if(isIOS){ title='🍎 iPhone / iPad — Ana Ekrana Ekle';
    steps=['Bu sayfayı <b>Safari</b> ile aç (Chrome/diğer tarayıcı değil).','Alttaki <b>Paylaş</b> düğmesi (□ içinden ↑ çıkan ok).','Listeyi kaydır → <b>«Ana Ekrana Ekle»</b>.','Sağ üstte <b>Ekle</b> → ana ekrana simge gelir.'];
    note='iOS\'ta otomatik "yükle" penceresi yoktur; kurulum bu adımlarla yapılır.';
  } else if(isAndroid){ title='📱 Android — Ana Ekrana Ekle';
    steps=['Sağ üst <b>⋮</b> (üç nokta) menüsünü aç.','<b>«Uygulamayı yükle»</b> ya da <b>«Ana ekrana ekle»</b> seçeneğine dokun.','<b>Ekle / Yükle</b> de → simge ana ekrana gelir.'];
    note='Çıkmıyorsa sayfayı yenile (kapatıp tekrar gir) ve birkaç saniye bekle.';
  } else if(isEdge){ title='💻 PC (Edge) — Masaüstüne Yükle';
    steps=['<b>Kurmak için:</b> sağ üst <b>⋯ → «Diğer araçlar» → «Bu siteyi uygulama olarak yükle»</b> → <b>«Yükle»</b>. <i>(Zaten yüklüyse bu adımı atla.)</i>','<b>Masaüstü simgesi için:</b> adres çubuğuna <b>edge://apps</b> yazıp Enter → «Sanifoam Kalite Kontrol»un sağındaki <b>⋯ → «Masaüstü kısayolu oluştur»</b>.','Aynı yerden istersen <b>«Görev çubuğuna sabitle»</b> / <b>«Başlat Menüsüne sabitleme»</b> de yapabilirsin. Sonra simgeden aç — tam ekran açılır.'];
    note='Otomatik kurulum penceresi bir kez «kapat» dendiğinde tarayıcı onu tekrar göstermez; kurulum yukarıdaki menü yoluyla yapılır.';
  } else { title='💻 PC (Chrome) — Masaüstüne Yükle';
    steps=['Adres çubuğunun <b>SAĞ UCUNDAKİ</b> yükle simgesine (<b>⊕ / küçük monitör</b>) tıkla. Yoksa: sağ üst <b>⋮ → Yayınla, kaydet ve paylaş → «Sayfayı uygulama olarak yükle»</b>.','Açılan kutuda <b>«Yükle»</b> de.','<b>Masaüstü simgesi için:</b> yeni sekmede <b>chrome://apps</b> aç → uygulamaya <b>sağ tık → «Kısayol oluştur» → «Masaüstü»</b> kutusunu işaretle → Oluştur.'];
    note='Daha önce çıkan otomatik kurulum penceresini kapattıysan tekrar çıkmaz; kurulum adres çubuğu simgesiyle yapılır.';
  }
  const root=$('#modalRoot');
  const bg=el('div',{class:'modal-bg',onclick:e=>{if(e.target===bg)root.innerHTML='';}});
  const m=el('div',{class:'modal',style:'position:relative;max-width:520px'});
  m.append(el('button',{class:'close-x',onclick:()=>root.innerHTML=''},'×'));
  m.append(el('h3',{},title));
  const ol=el('ol',{style:'margin:10px 0 0;padding-left:22px;line-height:1.7;font-size:14px'});
  steps.forEach(s=>ol.append(el('li',{html:s})));
  m.append(ol);
  if(note) m.append(el('p',{style:'color:var(--muted);font-size:12.5px;margin-top:12px'},'💡 '+note));
  m.append(el('div',{style:'display:flex;justify-content:flex-end;margin-top:14px'},el('button',{class:'btn sm',onclick:()=>root.innerHTML=''},'Anladım')));
  bg.append(m); root.append(bg);
}
$('#loginBtn').onclick=async()=>{
  const email=$('#email').value.trim().toLowerCase(), password=$('#password').value;
  if(!email||!password){authMsg('E-posta ve şifre gir.');return;}
  goFullscreen();   // kullanıcı jesti içinde tam ekran iste
  $('#loginBtn').disabled=true;
  try{
    if(isRegister){
      const {error}=await sb.auth.signUp({email,password});
      if(error)throw error;
      authMsg('Kayıt başarılı! Giriş yapılıyor…','ok');
      const {error:e2}=await sb.auth.signInWithPassword({email,password});
      if(e2)throw e2;
    }else{
      const {error}=await sb.auth.signInWithPassword({email,password});
      if(error)throw error;
    }
  }catch(e){ authMsg(translateAuthErr(e.message)); $('#loginBtn').disabled=false; }
};
$('#forgotBtn').onclick=async()=>{
  const email=$('#email').value.trim().toLowerCase();
  if(!email){authMsg('Önce e-postanı yaz.');return;}
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.href});
  authMsg(error?translateAuthErr(error.message):'Şifre sıfırlama bağlantısı e-postana gönderildi.', error?'err':'ok');
};
function translateAuthErr(m){
  if(/Invalid login/i.test(m))return'E-posta veya şifre hatalı.';
  if(/already registered/i.test(m))return'Bu e-posta zaten kayıtlı. Giriş yap.';
  if(/at least 6/i.test(m))return'Şifre en az 6 karakter olmalı.';
  return esc(m);
}
$('#logoutBtn').onclick=async()=>{await sb.auth.signOut();location.reload();};

let BOOTED=false;
function boot(session){
  if(BOOTED || !session?.user) return;
  BOOTED=true;
  ME={id:session.user.id,email:session.user.email};
  setTimeout(afterLogin,0);   // auth callback dışına çık (re-entrancy/döngü önlenir)
}
sb.auth.onAuthStateChange((_e,session)=>{ boot(session); });
(async()=>{ const {data}=await sb.auth.getSession(); boot(data.session); })();

async function fetchProfile(retries){
  retries=retries||1;
  for(let i=0;i<retries;i++){
    const {data}=await sb.from('profiles').select('*').eq('id',ME.id).maybeSingle();
    if(data) return data;
    if(i<retries-1) await new Promise(r=>setTimeout(r,600));  // tetikleyici gecikmesi için bekle
  }
  return null;
}
async function afterLogin(){
  PROFILE = await fetchProfile(6) || {approved:false,is_admin:false};
  $('#auth').classList.add('hidden'); $('#app').classList.remove('hidden');
  $('#whoEmail').textContent=ME.email;
  $('#whoRole').textContent=PROFILE.is_admin?'Yönetici':(PROFILE.approved?'Onaylı':'Onay bekliyor');
  $('#adminTab').classList.toggle('hidden', !PROFILE.is_admin);
  $('#leansysTab').classList.toggle('hidden', !PROFILE.is_admin);   // LeanSys sekmesi sadece admin
  $('#dashTab').classList.toggle('hidden', !can('dashboard'));   // admin + yetkili görür
  $('#ncrTab').classList.toggle('hidden', !can('ncr'));
  $('#eightdTab').classList.toggle('hidden', !can('ncr'));
  $('#certTab').classList.toggle('hidden', !can('cert'));
  document.querySelector('nav.tabs').classList.toggle('hidden', !(PROFILE.approved||PROFILE.is_admin));
  if(!PROFILE.approved && !PROFILE.is_admin){
    $('#pending').classList.remove('hidden');
    if(!window._pendTimer) window._pendTimer=setInterval(async()=>{   // onay gelince otomatik aç
      const p=await fetchProfile(1);
      if(p&&(p.approved||p.is_admin)){clearInterval(window._pendTimer);window._pendTimer=null;location.reload();}
    },5000);
    return;
  }
  $('#pending').classList.add('hidden');
  let _last=null; try{ _last=localStorage.getItem('kk_active_tab'); }catch(e){}
  const _lb=_last&&document.querySelector('nav.tabs button[data-tab="'+_last+'"]');
  switchTab(_lb && !_lb.classList.contains('hidden') ? _last : 'uretimler');   // yenileme sonrası kaldığın sekme (yetkin yoksa varsayılan)
}

  if(name==='izleme')renderIzleme($('#tab-izleme'));
  if(name==='plan')renderPlan();
  if(name==='istatistik')renderIstatistik();
  if(name==='dashboard')renderDashboard();
  if(name==='ncr')renderNCR();
  if(name==='eightd')renderEightD();

function machineGroupOf(code){ return MACHINE_GROUP_MAP[String(code||'').trim()] || ''; }
function ufDate(p){ return p.prod_date || (p.start_time?String(p.start_time).slice(0,10):''); }
function matchesUF(p){
  const ids=URETIM_FILT.ids||[];
  if(ids.length) return ids.some(x=>String(x)===String(p.id));   // izlenebilirlikten "Üretim listesinde gör" → YALNIZ bu op üretimleri
  const d=ufDate(p);
  if(URETIM_FILT.stock && p.stock_code!==URETIM_FILT.stock) return false;
  if(URETIM_FILT.group && machineGroupOf(p.machine_code)!==URETIM_FILT.group) return false;
  if(URETIM_FILT.machine && p.machine_code!==URETIM_FILT.machine) return false;
  if(URETIM_FILT.start && d && d<URETIM_FILT.start) return false;
  if(URETIM_FILT.end && d && d>URETIM_FILT.end) return false;
  return true;
}
function closeAutozones(){ document.querySelectorAll('.autozone.open').forEach(z=>{ z.classList.remove('open'); const mn=z.querySelector('.auto-menu,.auto-btn'); if(mn){mn.style.left='';mn.style.right='';} }); }
// Aç/kapat + ekran kenarına taşmasın diye yön ayarı (sola taşıyorsa sağa açılır)
function toggleAutozone(handle){
  const z=handle.parentElement, wasOpen=z.classList.contains('open');
  closeAutozones();
  if(wasOpen) return;
  z.classList.add('open');
  const menu=z.querySelector('.auto-menu')||z.querySelector('.auto-btn');
  if(menu){
    menu.style.left=''; menu.style.right='0';
    let r=menu.getBoundingClientRect();
    if(r.left<6){ menu.style.right='auto'; menu.style.left='0'; r=menu.getBoundingClientRect(); }   // sola taşıyor → sağa doğru aç
    if(r.right>window.innerWidth-6){ menu.style.right='6px'; menu.style.left='auto'; }               // sağa da taşıyorsa kenara yasla
  }
}
async function editSelectedProd(){
  const ids=[...document.querySelectorAll('#prodBody .prodChk:checked')].map(c=>Number(c.dataset.id));
  if(ids.length!==1){ toast('Düzenlemek için TEK üretim seç (sol kutucuk).','err'); return; }
  let pr=PRODS.find(p=>p.id===ids[0]);
  if(!pr){ const {data}=await sb.from('productions').select('*').eq('id',ids[0]).maybeSingle(); pr=data; }
  if(!pr){ toast('Üretim bulunamadı.','err'); return; }
  openManualProd(pr);
}
async function finishSelectedProds(){
  if(!(can('auto')||PROFILE.is_admin)){ toast('Bunun için yetkin yok.','err'); return; }
  const ids=[...document.querySelectorAll('#prodBody .prodChk:checked')].map(c=>Number(c.dataset.id));
  if(!ids.length){ toast('Önce üretim seç (sol kutucuk).','err'); return; }
  const {data:prods}=await sb.from('productions').select('*').in('id',ids);
  if(!prods||!prods.length){ toast('Üretim bulunamadı.','err'); return; }
  const now=new Date();
  let endOverride=now;   // diğer kullanıcılar: otomatik = şimdi
  if(PROFILE.is_admin){  // admin: bitiş saatini sor
    const _pad=n=>String(n).padStart(2,'0');
    const def=`${now.getFullYear()}-${_pad(now.getMonth()+1)}-${_pad(now.getDate())} ${_pad(now.getHours())}:${_pad(now.getMinutes())}`;
    const inp=prompt('Bitiş tarih-saatini gir (bitişi olmayan üretimlere uygulanır)\nÖrn: 2026-06-08 23:50', def);
    if(inp===null) return;
    const d=new Date(inp.trim().replace(' ','T'));
    if(isNaN(d.getTime())){ toast('Geçersiz tarih/saat. Örn: 2026-06-08 23:50','err'); return; }
    endOverride=d;
  }
  if(!confirm(`${prods.length} üretim bitirilecek (bitişi olmayanlara: ${endOverride.toLocaleString('tr-TR')}). Eksik kontroller — Seri Başı + saatlik Proses + Son — uygun üretilecek. Devam?`)) return;
  const stocks=[...new Set(prods.map(p=>p.stock_code).filter(Boolean))];
  const {data:planAll}=await sb.from('control_plan_items').select('*').in('stock_code',stocks).eq('active',true);
  const plan=planAll||[];
  const {data:exr}=await sb.from('control_records').select('production_id,stage').in('production_id',ids);
  const have={}; (exr||[]).forEach(r=>{ (have[r.production_id]=have[r.production_id]||new Set()).add(r.stage); });
  let madeN=0,prodN=0,skip=0;
  for(const p of prods){
    if(!p.start_time){ skip++; continue; }
    const start=new Date(p.start_time);
    const end = p.end_time ? new Date(p.end_time) : endOverride;   // bitiş yoksa: admin girdiği saat / şimdi
    if(end.getTime()<=start.getTime()){ skip++; continue; }        // bitiş başlamadan önce olamaz
    let durMin=Math.round((end.getTime()-start.getTime())/60000); if(durMin<1)durMin=1;
    if(!p.end_time){ await sb.from('productions').update({end_time:end.toISOString(),duration_min:durMin}).eq('id',p.id); p.end_time=end.toISOString(); p.duration_min=durMin; }
    const items=opItemsFor(plan.filter(x=>x.stock_code===p.stock_code), p.op_no);
    if(!items.length){ skip++; continue; }                      // bu stok kodunun planı yok
    const freq=prosesCycleFreq(stageItems(items,'proses'));
    const cur=have[p.id]||new Set();
    const recs=[];
    const offWhen=()=>new Date(Math.min(start.getTime()+Math.round((1+Math.random()*4)*60000), end.getTime()-30000));
    if(!cur.has('seri_basi')){ const r=buildAutoRec(p,'seri_basi',offWhen(),items,null); if(r)recs.push(r); }
    if(!cur.has('proses')){ let n=0; for(let t=freq;t<durMin && n<120;t+=freq,n++){ const jit=Math.round((Math.random()*10-5)*60000); let tm=start.getTime()+t*60000+jit; tm=Math.min(Math.max(tm,start.getTime()+60000),end.getTime()-60000); const r=buildAutoRec(p,'proses',new Date(tm),items,null); if(r)recs.push(r); } }
    if(!cur.has('son')){ const r=buildAutoRec(p,'son',end,items,null); if(r)recs.push(r); }
    if(recs.length){ const {error}=await sb.from('control_records').insert(recs); if(!error)madeN+=recs.length; }
    prodN++;
  }
  toast(`${prodN} üretim bitirildi, ${madeN} kontrol üretildi`+(skip?` (${skip} atlandı: başlama/plan yok)`:'')+' ✔','ok');
  renderUretimler();
}
async function deleteSelectedProds(){

  if(!confirm(`${ids.length} üretim ve bunlara ait TÜM kontrol kayıtları (seri başı/proses/son) silinecek. Emin misin?`)) return;
  const {error:e1}=await sb.from('control_records').delete().in('production_id',ids);

  toast(`${ids.length} üretim ve kontrolleri silindi.`,'ok'); renderUretimler();
}

async function openManualProd(existing){

  const machineCodes=[...new Set(PRODS.map(p=>p.machine_code).filter(Boolean))];

    field('Stok Kodu','mp_sc','700.0.454',stocks), field('Stok Adı','mp_sn',''), field('Cari','mp_cari',''), sm('İş Emri','mp_wo',{})
  ));
  m.append(el('div',{class:'row',style:'margin-bottom:10px'},
    sm('Miktar','mp_qty',{type:'number',step:'any'}), sm('Birim','mp_unit',{placeholder:'Ad'}),
    sm('Başlama','mp_start',{type:'time'}), sm('Bitiş','mp_end',{type:'time'}), field('Operatör','mp_oper','')
  ));
  m.append(el('button',{class:'btn',style:'margin-top:6px',onclick:saveManual},existing?'💾 Üretimi Güncelle':'💾 Üretimi Ekle'));
  bg.append(m); root.append(bg);
  if(existing){
    const setv=(id,v)=>{const e=$('#'+id); if(e)e.value=(v==null?'':v);};
    const _t=iso=>{ if(!iso)return''; const d=new Date(iso),pd=n=>String(n).padStart(2,'0'); return pd(d.getHours())+':'+pd(d.getMinutes()); };
    setv('mp_date', existing.prod_date||(existing.start_time?existing.start_time.slice(0,10):''));
    setv('mp_shift', existing.shift); setv('mp_op', existing.op_no);
    setv('mp_mc', existing.machine_code); setv('mp_mn', existing.machine_name);
    setv('mp_sc', existing.stock_code); setv('mp_sn', existing.stock_name); setv('mp_cari', existing.customer);
    setv('mp_wo', existing.work_order); setv('mp_qty', existing.quantity); setv('mp_unit', existing.unit);
    setv('mp_start', _t(existing.start_time)); setv('mp_end', _t(existing.end_time)); setv('mp_oper', existing.operator);
  }
  $('#mp_mc').addEventListener('change',()=>{ const pr=PRODS.find(p=>p.machine_code===$('#mp_mc').value.trim()); if(pr&&!$('#mp_mn').value)$('#mp_mn').value=pr.machine_name||''; });
  $('#mp_sc').addEventListener('change',()=>{ const pr=PRODS.find(p=>p.stock_code===$('#mp_sc').value.trim()); if(pr){ if(!$('#mp_sn').value)$('#mp_sn').value=pr.stock_name||''; if(!$('#mp_cari').value)$('#mp_cari').value=pr.customer||''; } });
  async function saveManual(){
    const date=$('#mp_date').value, mc=$('#mp_mc').value.trim(), sc=$('#mp_sc').value.trim();
    if(!date||!mc||!sc){ toast('Tarih, Makine Kodu ve Stok Kodu zorunlu.','err'); return; }
    const mkISO=t=> t? new Date(date+'T'+t+':00').toISOString() : null;
    const start=mkISO($('#mp_start').value), end=mkISO($('#mp_end').value), op=Number($('#mp_op').value)||null;
    const rec={ prod_date:date, shift:Number($('#mp_shift').value)||null, op_no:op,
      machine_code:mc, machine_name:$('#mp_mn').value.trim()||null,
      stock_code:sc, stock_name:$('#mp_sn').value.trim()||null, customer:$('#mp_cari').value.trim()||null,
      work_order:$('#mp_wo').value.trim()||null, quantity:Number($('#mp_qty').value)||null, unit:$('#mp_unit').value.trim()||null,
      start_time:start, end_time:end, operator:$('#mp_oper').value.trim()||null,
      fingerprint:`${mc}|${start||''}|${sc}|${op??''}` };
    let error;
    if(existing&&existing.id){ ({error}=await sb.from('productions').update(rec).eq('id',existing.id)); }
    else { ({error}=await sb.from('productions').upsert(rec,{onConflict:'fingerprint'})); }
    if(error){ toast(esc(error.message),'err'); return; }
    toast(existing?'Üretim güncellendi.':'Üretim eklendi.','ok'); root.innerHTML=''; renderUretimler();
  }
}

let _gkDeb=null;
// 📥 Giriş Kalite — LeanSys mal kabulden gelen ürünler; her birine giriş planına göre random kontrol
async function _renderGirisKalite(root, embed){
  const card=embed?el('div'):el('div',{class:'card'});   // embed: aşama sekmesi içine gömülü (kart yok)
  if(!embed) card.append(el('h3',{style:'margin-top:0'},'📥 Giriş Kalite — Mal Kabul (LeanSys)'));
  card.append(el('p',{style:'color:var(--muted);margin:'+(embed?'0':'-4px')+' 0 10px;font-size:13px',html:'Tedarikçiden mal kabulden gelen ürünler. Tazelemek için sunucuda <code>_malkabul_guncelle.bat</code>. Bir kayda <b>Kontrol Gir</b> → giriş kalite planına göre <b>random kontrol</b> oluşturulur (seri başı gibi).'}));
  const fCode=el('input',{class:'inp',placeholder:'🔍 stok kodu / ad / tedarikçi…',style:'min-width:240px',oninput:()=>{clearTimeout(_gkDeb);_gkDeb=setTimeout(load,400);}});
  const fFrom=el('input',{type:'date',class:'inp',onchange:load});
  const fTo=el('input',{type:'date',class:'inp',onchange:load});
  card.append(el('div',{class:'toolbar'},
    el('div',{class:'field',style:'flex:0'},el('label',{class:'lab'},'Ara'),fCode),
    el('div',{class:'field',style:'flex:0'},el('label',{class:'lab'},'İrsaliye Tarihi — Başlangıç'),fFrom),
    el('div',{class:'field',style:'flex:0'},el('label',{class:'lab'},'Bitiş'),fTo),
    el('button',{class:'btn sm sec',style:'flex:0',onclick:()=>{fCode.value='';fFrom.value='';fTo.value='';load();}},'Temizle')));
  const out=el('div'); card.append(out); root.append(card);
  let _gkSeq=0;
  async function load(){
    const my=++_gkSeq;   // yarış koruması: yalnız EN SON çağrı render eder
    out.innerHTML='<div class="empty" style="padding:10px">Yükleniyor…</div>';
    let q=sb.from('mal_kabul').select('*').order('tarih',{ascending:false}).limit(300).or('iade.eq.0,iade.is.null');   // iade HARİÇ (giriş kalite kuyruğu)
    const t=(fCode.value||'').trim(); if(t){ const s=t.replace(/[,()%]/g,' ').trim(); q=q.or(`stok_kodu.ilike.%${s}%,stok_adi.ilike.%${s}%,cari_adi.ilike.%${s}%`); }
    if(fFrom.value) q=q.gte('tarih',fFrom.value);
    if(fTo.value) q=q.lte('tarih',fTo.value);
    const {data,error}=await q;
    if(my!==_gkSeq) return;
    if(error){ out.innerHTML='<div class="msg err">'+esc(error.message)+'</div>'; return; }
    const rows=data||[];
    const ids=rows.map(r=>r.rec_id).filter(x=>x!=null);
    const doneSet=new Set(); if(ids.length){ const {data:dr}=await sb.from('control_records').select('mal_kabul_rec_id').in('mal_kabul_rec_id',ids); (dr||[]).forEach(d=>{if(d.mal_kabul_rec_id!=null)doneSet.add(d.mal_kabul_rec_id);}); }
    if(my!==_gkSeq) return;
    const codes=[...new Set(rows.map(r=>r.stok_kodu).filter(Boolean))];
    const planSet=new Set(); if(codes.length){ const {data:pp}=await sb.from('control_plan_items').select('stock_code').in('stock_code',codes).eq('giris_kalite',true).eq('active',true); (pp||[]).forEach(p=>planSet.add(p.stock_code)); }
    if(my!==_gkSeq) return;
    out.innerHTML='';
    if(!rows.length){ out.append(el('div',{class:'empty',style:'padding:10px'},'Mal kabul kaydı yok. (Önce sunucuda _malkabul_guncelle.bat çalıştır.)')); return; }
    const tb=el('table');
    tb.append(el('thead',{},el('tr',{},...['Tarih','Stok Kodu','Stok Adı','Tedarikçi','Miktar','İrsaliye','Plan','İşlem'].map(h=>el('th',{},h)))));
    const body=el('tbody');
    const pending=rows.filter(r=>!doneSet.has(r.rec_id));   // GİRİLENLER listeden kalkar → Giriş Kalite Kayıtları'na geçer
    pending.forEach(r=>{
      const hasPlan=planSet.has(r.stok_kodu);
      body.append(el('tr',{},
        el('td',{style:'white-space:nowrap'},fmtDate(r.tarih)),
        el('td',{style:'font-weight:600'},r.stok_kodu||''),
        el('td',{style:'font-size:12px',title:r.stok_adi||''},(r.stok_adi||'').slice(0,40)),
        el('td',{style:'font-size:12px',title:r.cari_adi||''},(r.cari_adi||'').slice(0,26)),
        el('td',{style:'white-space:nowrap'},(r.miktar??'')+' '+(r.birim||'')),
        el('td',{style:'font-size:11px;white-space:nowrap'},(r.seri||'')+(r.sira?(' / '+r.sira):'')),
        el('td',{}, hasPlan?el('span',{class:'pill ok'},'var'):el('span',{class:'pill gray'},'yok')),
        el('td',{}, hasPlan?el('button',{class:'btn sm',onclick:()=>girisKaliteGir(r)},'Kontrol Gir'):el('span',{style:'color:var(--muted);font-size:11px'},'plan yok'))
      ));
    });
    if(!pending.length){ body.append(el('tr',{},el('td',{colspan:8},el('div',{class:'empty',style:'padding:14px'},'Bu kriterde girilecek (henüz girilmemiş) mal kabul yok. Girilenler Giriş Kalite Kayıtları’nda.')))); }
    tb.append(body); out.append(el('div',{class:'tbl-wrap'},tb));
  }
  load();
}

// (eski openGirisKalite — artık kullanılmıyor; girisKaliteGir+openControl ile seri başı modalı kullanılıyor)
async function openGirisKalite(mk){
  const {data:plan}=await sb.from('control_plan_items').select('*').eq('stock_code',mk.stok_kodu).eq('active',true).order('op_no',{nullsFirst:true}).order('seq');
  const items=(plan||[]).filter(it=>it.giris_kalite===true);
  const root=$('#modalRoot');
  if(!items.length){ toast(`"${mk.stok_kodu}" için giriş kalite planı yok.`,'err'); return; }
  const state={};
  function regen(){ items.forEach(it=>{ const n=sampleCount(it,'giris'); state[it.id]={samples:genSamples(it,n)}; }); render(); }
  function markOk(it,s){ if(it.is_qualitative) return; const v=parseNum(s.value); const lo=Number(it.lower_limit),hi=Number(it.upper_limit); let ok=true; if(isFinite(lo)&&v<lo)ok=false; if(isFinite(hi)&&v>hi)ok=false; s.ok=ok; }
  items.forEach(it=>{ const n=sampleCount(it,'giris'); state[it.id]={samples:genSamples(it,n)}; });
  function render(){
    root.innerHTML='';
    const bg=el('div',{class:'modal-bg',onclick:e=>{if(e.target===bg)root.innerHTML='';}});
    const m=el('div',{class:'modal',style:'position:relative;max-width:1500px'});
    m.append(el('button',{class:'close-x',onclick:()=>root.innerHTML=''},'×'));
    m.append(el('h3',{},'📥 Giriş Kalite Kontrolü'));
    m.append(el('div',{class:'meta',html:`<b>${esc(mk.stok_kodu)}</b> — ${esc(mk.stok_adi||'')}<br>Tedarikçi: <b>${esc(mk.cari_adi||'-')}</b> · İrsaliye: ${esc((mk.seri||'')+(mk.sira?(' / '+mk.sira):''))} · Miktar: ${mk.miktar??''} ${esc(mk.birim||'')} · Tarih: ${fmtDate(mk.tarih)}`}));
    const operInp=el('input',{class:'inp',id:'gk_oper',placeholder:'Ölçümü yapan',value:AUTO_MEASURER,style:'max-width:220px'});
    m.append(el('div',{class:'row',style:'gap:10px;margin:6px 0;align-items:flex-end'},
      el('div',{class:'field',style:'flex:0'},el('label',{class:'lab'},'Ölçümcü'),operInp),
      el('button',{class:'btn sm sec',style:'flex:0',onclick:regen,title:'Tüm ölçümleri yeniden random üret'},'🎲 Yeniden Random'),
      el('div',{class:'grow'}),
      el('button',{class:'btn',style:'flex:0',onclick:save},'💾 Kaydet')));
    const tb=el('table');
    tb.append(el('thead',{},el('tr',{},...['Ölçülecek Değer','Nitel Hedef / Birim','Yöntem','Hedef','Alt','Üst','Örn.','Ölçümler / Sonuç'].map(h=>el('th',{},h)))));
    const body=el('tbody');
    items.forEach(it=>{
      const st=state[it.id]; const sampCell=el('td',{});
      st.samples.forEach(s=>{
        if(it.is_qualitative){
          const b=el('button',{class:'btn sm '+(s.ok?'':'danger'),style:'margin:1px'},s.ok?'OK':'RET');
          b.onclick=()=>{ s.ok=!s.ok; b.className='btn sm '+(s.ok?'':'danger'); b.textContent=s.ok?'OK':'RET'; };
          sampCell.append(b);
        } else {
          markOk(it,s);
          const inp=el('input',{class:'inp',style:'width:64px;margin:1px;display:inline-block'+(s.ok?'':';border-color:var(--ret)'),value:s.value==null?'':s.value});
          inp.oninput=e=>{ s.value=e.target.value; markOk(it,s); inp.style.borderColor=s.ok?'':'var(--ret)'; };
          sampCell.append(inp);
        }
      });
      body.append(el('tr',{},
        el('td',{style:'font-weight:600'},it.measure_name||''),
        el('td',{},it.is_qualitative?(it.nitel_hedef||''):(it.unit||'')),
        el('td',{},it.method||''),
        el('td',{},it.target??''),
        el('td',{},it.lower_limit??''),
        el('td',{},it.upper_limit??''),
        el('td',{},sampleCount(it,'giris')),
        sampCell));
    });
    tb.append(body); m.append(el('div',{class:'tbl-wrap'},tb));
    bg.append(m); root.append(bg);
  }
  async function save(){
    const oper=($('#gk_oper')&&$('#gk_oper').value.trim())||null;
    const vals=items.map(it=>{ const n=sampleCount(it,'giris'); const st=state[it.id]||{samples:[]};
      const samples=(st.samples||[]).slice(0,n).map(s=>({value:(s.value==null?null:String(s.value).trim().replace(',','.')||null),ok:s.ok===true,note:s.note||null,by:oper}));
      return {plan_item_id:it.id,measure_name:it.measure_name,target:it.target,unit:it.unit,nitel_hedef:it.nitel_hedef,lower_limit:it.lower_limit,upper_limit:it.upper_limit,method:it.method,sampling_frequency:it.sampling_frequency,is_qualitative:it.is_qualitative,sample_size:n,samples}; });
    const allS=vals.flatMap(v=>v.samples); if(!allS.length){toast('Ölçüm yok.','err');return;}
    const overall=allS.some(s=>s.ok===false)?'RET':'OK';
    const rec={production_id:null, stock_code:mk.stok_kodu, stock_name:mk.stok_adi, stage:'giris', operator:oper, shift:shiftForTime(new Date()), vals, overall_result:overall,
      mal_kabul_rec_id:mk.rec_id, giris_cari:mk.cari_adi, giris_irsaliye:(mk.seri||'')+(mk.sira?(' / '+mk.sira):''), giris_miktar:mk.miktar, giris_birim:mk.birim};
    const {data:ins,error}=await sb.from('control_records').insert(rec).select().maybeSingle();
    if(error){toast(esc(error.message),'err');return;}
    toast(`Giriş kalite kaydedildi (${overall}).`, overall==='RET'?'err':'ok');
    if(overall==='RET'){ try{ await autoOpenNCR(ins||rec, {stock_code:mk.stok_kodu,stock_name:mk.stok_adi,customer:mk.cari_adi}); }catch(e){} }
    root.innerHTML='';
    if(!$('#tab-bekleyen').classList.contains('hidden')) renderBekleyen();
    try{ loadControlCounts(); }catch(e){}
  }
  render();
}
// ⏰ Girilecek Kontroller — vadesi gelenler aşamaya göre alt-sekmelere (Giriş Kalite / Seri Başı / Proses / Son) düşer
let _dueActive='';   // seçili aşama sekmesi (kontrol girince renderBekleyen yeniden çizilir; seçim korunur)
async function _renderDueControls(root){
  const card=el('div',{class:'card'});
  const seg=el('div',{style:'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px'});
  const listWrap=el('div',{});
  card.append(seg, listWrap); root.append(card);
  const prodIds=PRODS.map(p=>p.id).filter(x=>x!=null);
  if(!prodIds.length){ listWrap.innerHTML='<div class="empty" style="padding:10px">Üretim yok.</div>'; return; }
  // yapılmış kontroller (aşama bazında)
  const byProd={};
  // id'leri parçala + sayfalı çek (1000 satır kapağını aş) → yapılmış kontroller eksiksiz sayılsın; girilmiş üretim kuyrukta kalmasın
  for(let i=0;i<prodIds.length;i+=300){ const chunk=prodIds.slice(i,i+300);
    for(let from=0;;from+=1000){ const {data:rr}=await sb.from('control_records').select('production_id,stage').in('production_id',chunk).range(from,from+999);
      (rr||[]).forEach(r=>{ const o=byProd[r.production_id]||(byProd[r.production_id]={seri:false,proses:0,son:false});
        if(r.stage==='seri_basi')o.seri=true; else if(r.stage==='proses')o.proses++; else if(r.stage==='son')o.son=true; });
      if(!rr||rr.length<1000)break; } }
  // plan proses örnekleme sıklığı (stok bazında, en sık olan)
  const stocks=[...new Set(PRODS.map(p=>p.stock_code).filter(Boolean))];
  const freqByStock={}; const planByStock={};
  if(stocks.length){
    const pl=[];
    for(let i=0;i<stocks.length;i+=200){ const chunk=stocks.slice(i,i+200);
      for(let from=0;;from+=1000){ const {data}=await sb.from('control_plan_items').select('stock_code,op_no,sampling_frequency,process_control,final_control,giris_kalite,active').in('stock_code',chunk).range(from,from+999); pl.push(...(data||[])); if(!data||data.length<1000)break; } }
    pl.filter(it=>it.active!==false).forEach(it=>{ (planByStock[it.stock_code]||(planByStock[it.stock_code]=[])).push(it); });
    Object.keys(planByStock).forEach(sc=>{ freqByStock[sc]=prosesCycleFreq(planByStock[sc]); }); }
  const now=Date.now();
  const groups={seri_basi:[], proses:[], son:[]};
  PRODS.forEach(p=>{
    if(!p.start_time) return;
    const start=new Date(p.start_time).getTime(), end=p.end_time?new Date(p.end_time).getTime():null, finished=!!end;
    if(!finished && (now-start)>3*24*60*60000) return;      // 3 günden eski AÇIK üretim = unutulmuş/kapanmamış (gerçek koşu < birkaç gün), listeleme
    if(finished && (now-end)>14*24*60*60000) return;        // çok eski bitmişi listeleme
    const elapsed=Math.max(0,Math.round(((end||now)-start)/60000));
    const o=byProd[p.id]||{seri:false,proses:0,son:false};
    const freq=freqByStock[p.stock_code]||60;
    // OP bazlı (otomatik üretimle birebir): bu üretimin op'unda proses/son maddesi yoksa o kuyrukta gösterme
    const _items=opItemsFor(planByStock[p.stock_code]||[], p.op_no);
    const hasProc=stageItems(_items,'proses').length>0;   // seri başı + proses = process_control maddeleri
    const hasSon=stageItems(_items,'son').length>0;        // son = final_control maddeleri
    const prosesExp=Math.min(Math.max(0,Math.ceil(elapsed/freq)-1),100);   // otomatik üretimle aynı sayı (t=freq..t<süre)
    if(!o.seri && hasProc) groups.seri_basi.push({p,finished,start});
    if(hasProc && prosesExp>o.proses){ for(let k=o.proses+1;k<=prosesExp;k++) groups.proses.push({p,finished,start,prosesNo:k,dueMs:start+k*freq*60000}); }   // her vadesi gelen proses = AYRI satır
    if(finished && !o.son && hasSon) groups.son.push({p,finished,start});
  });
  Object.values(groups).forEach(g=> g.sort((a,b)=> (a.finished?1:0)-(b.finished?1:0) || (b.start-a.start) || ((a.prosesNo||0)-(b.prosesNo||0)) ) );
  const STG=[['seri_basi','🏁 Seri Başı'],['proses','⚙️ Proses'],['son','🏆 Son Kontrol']];
  const SEG_ALL=[['giris','📥 Giriş Kalite'],...STG];   // Giriş Kalite = en SOLDAKİ aşama sekmesi (Seri Başı'nın solunda)
  let active = (SEG_ALL.some(([k])=>k===_dueActive) ? _dueActive : (STG.find(([k])=>groups[k].length)||STG[0])[0]);
  function renderSeg(){ seg.innerHTML='';
    SEG_ALL.forEach(([k,lab])=>{ const n=groups[k]?groups[k].length:null;
      seg.append(el('button',{class:'btn '+(active===k?'':'sec'),style:'flex:0;min-width:128px;padding:11px 20px;font-size:14px',onclick:()=>{active=k;_dueActive=k;renderSeg();renderList();}}, n==null?lab:`${lab} (${n})`)); }); }
  function renderList(){ listWrap.innerHTML='';
    if(active==='giris'){ _renderGirisKalite(listWrap, true); return; }   // mal kabul / giriş kalite listesi
    const arr=groups[active];
    if(!arr.length){ listWrap.innerHTML='<div class="empty" style="padding:16px;color:var(--ok)">Bu aşamada bekleyen kontrol yok</div>'; return; }
    arr.slice(0,150).forEach(({p,finished,prosesNo,dueMs})=>{
      const openIt=()=>openControl(p,active, active==='proses'?dueMs:undefined);
      const row=el('div',{title:'Giriş için tıkla',style:'display:flex;align-items:center;gap:10px;padding:13px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;cursor:pointer;border-radius:8px;transition:background .12s',
        onclick:openIt,
        onmouseenter:e=>e.currentTarget.style.background='rgba(125,125,125,.10)',
        onmouseleave:e=>e.currentTarget.style.background=''});
      const headHtml=`${active==='proses'?`<span class="pill gray" style="margin-right:6px">⚙️ ${prosesNo}. proses · hedef ~${fmtTime(dueMs)}</span>`:''}${esc(p.machine_name||'')}${p.machine_code?` (${esc(p.machine_code)})`:''}${finished?'':' <span style="color:var(--ok);font-weight:700">● devam</span>'}`;
      row.append(el('div',{class:'grow',style:'min-width:240px;pointer-events:none'},
        el('div',{style:'font-weight:600;font-size:14px',html:headHtml}),
        el('div',{style:'font-size:12.5px;color:var(--muted)',html:`${esc(p.stock_code||'')} ${esc((p.stock_name||'').slice(0,28))}${p.customer?' · 🏢 '+esc(p.customer):''} · ${fmtDate(p.prod_date)} ${fmtTimeWall(p.start_time)}${p.end_time?'–'+fmtTimeWall(p.end_time):''} · İş ${esc(p.work_order||'-')} · ${p.quantity??''} ${esc(p.unit||'')}`})));
      row.append(el('button',{class:'btn',style:'flex:0;min-width:150px;padding:12px 24px;font-size:15px;font-weight:600',onclick:e=>{e.stopPropagation();openIt();}}, '➕ Gir'));
      listWrap.append(row);

// ---- Excel parse & import ----
const HEADER_MAP={
  'makine kodu':'machine_code','makine adı':'machine_name','makine adi':'machine_name',
  'cari adı':'customer','cari adi':'customer','stok kodu':'stock_code','stok adı':'stock_name','stok adi':'stock_name',
  'miktar':'quantity','br':'unit','tarih':'prod_date','vardiya':'shift','başlama':'start_time','baslama':'start_time',
  'bitiş':'end_time','bitis':'end_time','süre':'duration_min','sure':'duration_min','operatör':'operator','operator':'operator',
  'op.no':'op_no','op no':'op_no','iş emri':'work_order','is emri':'work_order','müşteri sip no':'customer_order_no',
  'sip seri':'order_serial','sip sıra':'order_seq','sip sira':'order_seq'
};
function normHdr(s){return deTr(s);}   // Türkçe İ/ı vb. güvenli normalizasyon
const HMAP={}; Object.keys(HEADER_MAP).forEach(k=>HMAP[deTr(k)]=HEADER_MAP[k]);
// tek bir Excel dosyasını parse eder → {rows, err}
function parseProdFile(buf){
  const wb=XLSX.read(buf,{cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
  const rowsW=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:null});   // Excel'de GÖRÜNEN metin (saat dilimi bağımsız tarih için)
  let hi=rows.findIndex(r=>r&&r.some(c=>normHdr(c)==='makine kodu'));
  if(hi<0) return {rows:[],err:'başlık (Makine Kodu) bulunamadı'};
  const hdr=rows[hi].map(normHdr);
  const idx={}; hdr.forEach((h,i)=>{ if(HMAP[h]!==undefined) idx[HMAP[h]]=i; });
  if(idx.machine_code===undefined||idx.stock_code===undefined) return {rows:[],err:'gerekli sütunlar yok'};
  const out=[];
  for(let r=hi+1;r<rows.length;r++){
    const row=rows[r]; if(!row)continue;
    const mc=row[idx.machine_code]; const sc=idx.stock_code!=null?row[idx.stock_code]:null;
    if(!mc||/^makine grup/i.test(String(mc)))continue;       // grup başlığı / boş
    if(!sc)continue;
    const g=k=>idx[k]!=null?row[idx[k]]:null;
    const gw=k=>(idx[k]!=null&&rowsW[r])?rowsW[r][idx[k]]:null;   // o hücrenin Excel'de görünen metni
    const toISO=v=>v instanceof Date?v.toISOString():(v?new Date(v).toISOString():null);
    // prod_date: Excel'de GÖRÜNEN metinden al (saat dilimi bağımsız) → anti-detect / farklı saat dilimli tarayıcıda 1 gün KAYMAZ. Olmazsa Date'in UTC bileşeni.
    const dtRaw=g('prod_date');
    let pdate=parseExcelDateStr(gw('prod_date'));
    if(!pdate) pdate = dtRaw instanceof Date ? isoDateUTC(dtRaw) : parseExcelDateStr(dtRaw);
    // başlama/bitiş = TARİH + SAAT (görünen metinden, tz/float bağımsız). Gece yarısını geçerse bitiş ERTESİ güne taşınır.
    const sHM=parseExcelTimeStr(gw('start_time')) || timeFromExcel(g('start_time'));
    const eHM=parseExcelTimeStr(gw('end_time'))   || timeFromExcel(g('end_time'));
    let start = (pdate&&sHM) ? `${pdate}T${sHM}:00` : toISO(g('start_time'));
    let end;
    if(pdate&&eHM){ end=`${pdate}T${eHM}:00`;
      if(typeof start==='string' && start.length===19 && end<start){ const d2=new Date(pdate+'T00:00:00'); d2.setDate(d2.getDate()+1); end=`${isoDateLocal(d2)}T${eHM}:00`; }
    } else end=toISO(g('end_time'));
    const start_fp=toISO(g('start_time'));   // fingerprint ESKİ değerle sabit → re-import mevcut kaydı GÜNCELLER (kopya OLMAZ)
    out.push({
      machine_code:String(mc).trim(), machine_name:str(g('machine_name')), customer:str(g('customer')),
      stock_code:String(sc).trim(), stock_name:str(g('stock_name')),
      quantity:num(g('quantity')), unit:str(g('unit')), prod_date:pdate, shift:num(g('shift')),
      start_time:start, end_time:end, duration_min:num(g('duration_min')), operator:str(g('operator')),
      op_no:num(g('op_no')), work_order:str(g('work_order')), customer_order_no:str(g('customer_order_no')),
      order_serial:str(g('order_serial')), order_seq:str(g('order_seq')),
      fingerprint:`${String(mc).trim()}|${start_fp||''}|${String(sc).trim()}|${num(g('op_no'))??''}`
    });
  }
  return {rows:out,err:null};
}
async function importProds(){
  const files=[...$('#prodFile').files];
  if(!files.length){toast('Önce dosya seç.','err');return;}
  const all=[]; const msgs=[]; let okFiles=0;
  for(const f of files){
    try{ const {rows,err}=parseProdFile(await f.arrayBuffer());
      if(err){ msgs.push(`⚠ ${f.name}: ${err}`); continue; }
      all.push(...rows); okFiles++; msgs.push(`✓ ${f.name}: ${rows.length} satır`);
    }catch(e){ msgs.push(`✗ ${f.name}: ${e.message}`); }
  }
  if(!all.length){ toast('İçe aktarılacak satır bulunamadı. '+msgs.join(' · '),'err'); return; }
  // dosyalar arası aynı üretimi (fingerprint) tekrar etme
  const seen=new Set(); const dedup=all.filter(r=>{ if(seen.has(r.fingerprint))return false; seen.add(r.fingerprint); return true; });
  // büyük toplu yüklemeleri parça parça gönder
  for(let i=0;i<dedup.length;i+=500){ const {error}=await sb.from('productions').upsert(dedup.slice(i,i+500),{onConflict:'fingerprint'}); if(error){ toast('İçe aktarma hatası: '+esc(error.message),'err'); return; } }
  const fileNote = files.length>1 ? `${files.length} dosya · ` : '';
  toast(`${fileNote}${dedup.length} üretim işlendi (tekrarlar atlandı).`,'ok');
  if(files.length>1) console.log('İçe aktarma:', msgs.join('\n'));
  renderUretimler();
}
// ===== LeanSys Klasör Senkron ("API gibi"): bir klasörü bir kez bağla, içindeki tüm Excelleri tek tuşla içeri çek =====
function _kkIdb(){ return new Promise((res,rej)=>{ const r=indexedDB.open('kk_fs',1); r.onupgradeneeded=()=>{ try{r.result.createObjectStore('h');}catch(e){} }; r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function _idbGet(k){ try{ const db=await _kkIdb(); return await new Promise(res=>{ const t=db.transaction('h','readonly').objectStore('h').get(k); t.onsuccess=()=>res(t.result); t.onerror=()=>res(null); }); }catch(e){ return null; } }
async function _idbPut(k,v){ try{ const db=await _kkIdb(); return await new Promise(res=>{ const t=db.transaction('h','readwrite').objectStore('h').put(v,k); t.onsuccess=()=>res(true); t.onerror=()=>res(false); }); }catch(e){ return false; } }
async function syncLeanSysFolder(forcePick){
  if(!window.showDirectoryPicker){ toast('Bu tarayıcı klasör erişimini desteklemiyor (Chrome/Edge gerekir). Anti-detect tarayıcı engelleyebilir; normal Chrome dene.','err'); return; }
  let dir = forcePick ? null : await _idbGet('leansys_dir');
  try{
    if(!dir){ dir = await window.showDirectoryPicker({mode:'read',id:'leansys'}); await _idbPut('leansys_dir', dir); localStorage.setItem('leansys_dir_name', dir.name||'klasör'); }
    let perm = await dir.queryPermission({mode:'read'});
    if(perm!=='granted') perm = await dir.requestPermission({mode:'read'});
    if(perm!=='granted'){ toast('Klasör izni verilmedi.','err'); return; }
  }catch(e){ if(e&&e.name==='AbortError') return; toast('Klasör seçilemedi: '+(e&&e.message||e),'err'); return; }
  // klasördeki (alt klasörler dahil) tüm Excelleri topla
  const handles=[];
  async function walk(h){ for await(const [name,ch] of h.entries()){ if(ch.kind==='file'){ if(/\.(xlsx|xls)$/i.test(name) && !/^~\$/.test(name)) handles.push(ch); } else if(ch.kind==='directory'){ try{ await walk(ch); }catch(e){} } } }
  try{ await walk(dir); }catch(e){ toast('Klasör okunamadı: '+(e&&e.message||e),'err'); return; }
  if(!handles.length){ toast('Klasörde Excel (.xls/.xlsx) bulunamadı.','err'); return; }
  toast(`${handles.length} Excel okunuyor…`,'ok');
  const all=[]; let okF=0; const msgs=[];
  for(const h of handles){
    try{ const f=await h.getFile(); const {rows,err}=parseProdFile(await f.arrayBuffer());
      if(err){ msgs.push(`⚠ ${f.name}: ${err}`); continue; }
      all.push(...rows); okF++; msgs.push(`✓ ${f.name}: ${rows.length}`);
    }catch(e){ msgs.push(`✗ ${h.name}: ${e&&e.message||e}`); }
  }
  if(!all.length){ toast('İçe aktarılacak satır yok. '+msgs.join(' · '),'err'); return; }
  const seen=new Set(); const dedup=all.filter(r=>{ if(seen.has(r.fingerprint))return false; seen.add(r.fingerprint); return true; });
  for(let i=0;i<dedup.length;i+=500){ const {error}=await sb.from('productions').upsert(dedup.slice(i,i+500),{onConflict:'fingerprint'}); if(error){ toast('Senkron hatası: '+esc(error.message),'err'); return; } }
  localStorage.setItem('leansys_dir_name', dir.name||'klasör');
  console.log('LeanSys senkron:', msgs.join('\n'));
  toast(`✅ Senkron tamam: ${okF} dosya · ${dedup.length} üretim güncellendi.`,'ok');
  renderUretimler();
}
const str=v=>{const s=(v==null?'':String(v)).trim();return s===''?null:s;};
const num=v=>{if(v==null||v==='')return null;const n=Number(v);return isNaN(n)?null:n;};
const isoDateLocal=d=>{const z=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());};  // yerel tarih (UTC kaymasız) YYYY-MM-DD
const isoDateUTC=d=>{const z=n=>String(n).padStart(2,'0');return d.getUTCFullYear()+'-'+z(d.getUTCMonth()+1)+'-'+z(d.getUTCDate());};  // SheetJS UTC serisinden saat-dilimi BAĞIMSIZ YYYY-MM-DD
function parseExcelDateStr(s){            // Excel'de GÖRÜNEN tarih metnini saat-dilimi bağımsız YYYY-MM-DD'ye çevir
  if(s==null||s==='') return null; s=String(s).trim();
  const z=n=>String(n).padStart(2,'0');
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m) return `${m[1]}-${z(m[2])}-${z(m[3])}`;
  m=s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);
  if(m){ let a=+m[1],b=+m[2],y=m[3]; if(y.length===2)y='20'+y;
    let day,mon; if(a>12){day=a;mon=b;} else if(b>12){day=b;mon=a;} else {day=a;mon=b;}   // belirsizse gg.aa.yyyy (TR)
    if(mon>=1&&mon<=12&&day>=1&&day<=31) return `${y}-${z(mon)}-${z(day)}`; }
  return null;
}
function parseExcelTimeStr(s){            // Excel'de GÖRÜNEN saat metni → "HH:MM" (tz/float bağımsız)
  if(s==null||s==='') return null; s=String(s).trim();
  const m=s.match(/(\d{1,2}):(\d{2})/);
  if(m){ const h=+m[1], mi=+m[2]; if(h<24&&mi<60) return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0'); }
  return null;
}
function timeFromExcel(v){                // Excel saat-Date'i → "HH:MM" (en yakın dakikaya yuvarla → float -1dk düzelir)
  if(!(v instanceof Date)) return null;
  const d=new Date(Math.round(v.getTime()/60000)*60000);
  return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0');
}

// Katlanır kart (dropdown gibi çubuk): başlığa tıkla → aç/kapa. Varsayılan kapalı.
function collapseBar(title, ...body){
  const d=el('details',{class:'card',style:'padding:0;overflow:hidden'});
  d.append(el('summary',{style:'cursor:pointer;padding:13px 16px;font-weight:600;font-size:15px;list-style:none;user-select:none;display:flex;align-items:center;gap:8px'},
    el('span',{style:'color:var(--muted);font-size:12px'},'▸'), title));
  d.append(el('div',{style:'padding:2px 16px 16px'}, ...body.filter(Boolean)));
  return d;
}

  catch(e){ const {data}=await sb.from('control_plan_items').select('stock_code,stock_name').order('stock_code'); const m=new Map(); (data||[]).forEach(r=>{ if(!m.has(r.stock_code)) m.set(r.stock_code,{stock_code:r.stock_code,stock_name:r.stock_name,n:0}); m.get(r.stock_code).n++; }); planList=[...m.values()]; }

function pin(it,field,o){
  o=o||{};
  if(!can('plan')){
    if(o.bool) return el('span',{}, it[field]!==false?'✓':'—');
    if(o.select) return el('span',{}, it.is_qualitative?'Nitel':'Ölçüm');
    return el('span',{}, (it[field]==null||it[field]==='')?'-':String(it[field]));
  }
  if(o.select){
    const s=el('select',{class:'cell-inp',onchange:e=>updatePlan(it,{is_qualitative:e.target.value==='true'})});
    [['false','Ölçüm'],['true','Nitel']].forEach(([v,t])=>{const op=el('option',{value:v},t);if(String(!!it[field])===v)op.selected=true;s.append(op);});
    return s;
  }
  if(o.bool){
    const cur = it[field]!==false; // null/undefined/true => Evet
    const s=el('select',{class:'cell-inp',onchange:e=>updatePlan(it,{[field]:e.target.value==='true'})});
    [['true','✓'],['false','—']].forEach(([v,t])=>{const op=el('option',{value:v},t);if(String(cur)===v)op.selected=true;s.append(op);});
    return s;
  }
  return el('input',{class:'cell-inp',value:it[field]??'',style:o.w?('width:'+o.w):'',
    onchange:e=>{let v=e.target.value.trim();
      if(o.num) v=(v===''?null:(isFinite(Number(v))?Number(v):null));
      else v=(v===''?null:v);
      updatePlan(it,{[field]:v});
    }});
}

async function applyItemToHistory(item, mode, dateFrom){
  let q=sb.from('control_records').select('id,stage,production_id,vals,checked_at').eq('stock_code',item.stock_code);
  if(mode==='after'&&dateFrom) q=q.gte('checked_at',dateFrom);
  const {data:recs,error}=await q.limit(5000);
  if(error){toast(esc(error.message),'err');return 0;}
  // op_no eşleşmesi için üretim op haritası
  let opMap={};
  if(item.op_no!=null){ const ids=[...new Set((recs||[]).map(r=>r.production_id).filter(Boolean))];
    if(ids.length){ const {data:pr}=await sb.from('productions').select('id,op_no').in('id',ids); (pr||[]).forEach(p=>opMap[p.id]=p.op_no); } }
  let updated=0;
  for(const r of (recs||[])){
    if(!stageItems([item], r.stage).length) continue;                                  // bu aşamaya uymuyor
    if(item.op_no!=null && opMap[r.production_id]!=null && String(opMap[r.production_id])!==String(item.op_no)) continue;  // op uyumsuz
    const vals=r.vals||[];
    const existing=vals.find(v=>v.plan_item_id===item.id);
    if(existing){
      // zaten ekli → yalnız MADDE DEĞİŞTİYSE güncelle (ad/limit/birim vb.); değer korunur, ok yeni limite göre yeniden hesaplanır
      const changed = existing.measure_name!==item.measure_name || String(existing.lower_limit??'')!==String(item.lower_limit??'') ||
        String(existing.upper_limit??'')!==String(item.upper_limit??'') || String(existing.target??'')!==String(item.target??'') ||
        (existing.unit??'')!==(item.unit??'') || (existing.nitel_hedef??'')!==(item.nitel_hedef??'') || (existing.method??'')!==(item.method??'') || !!existing.is_qualitative!==!!item.is_qualitative;
      if(!changed) continue;
      Object.assign(existing,{measure_name:item.measure_name,target:item.target,unit:item.unit,nitel_hedef:item.nitel_hedef,
        lower_limit:item.lower_limit,upper_limit:item.upper_limit,method:item.method,sampling_frequency:item.sampling_frequency,is_qualitative:item.is_qualitative});
      if(!item.is_qualitative){ const lo=Number(item.lower_limit),hi=Number(item.upper_limit);
        (existing.samples||[]).forEach(s=>{ const x=Number(s.value); if(s.value!=null&&isFinite(x)){ let ok=true; if(isFinite(lo)&&x<lo)ok=false; if(isFinite(hi)&&x>hi)ok=false; s.ok=ok; } }); }
    } else {
      const n=sampleCount(item, r.stage);
      vals.push({plan_item_id:item.id,measure_name:item.measure_name,target:item.target,unit:item.unit,nitel_hedef:item.nitel_hedef,
        lower_limit:item.lower_limit,upper_limit:item.upper_limit,method:item.method,sampling_frequency:item.sampling_frequency,
        is_qualitative:item.is_qualitative,sample_size:n,samples:genSamples(item,n)});
    }
    const overall = vals.flatMap(v=>v.samples||[]).some(s=>s.ok===false)?'RET':'OK';
    const {error:e2}=await sb.from('control_records').update({vals,overall_result:overall}).eq('id',r.id);
    if(!e2)updated++;
  }
  return updated;
}

async function bulkDeletePlans(codes, isAll){
  if(!can('plan')){ toast('Bu işlem için yetkin yok (plan).','err'); return; }
  // TÜM Planları Sil: yüklenen/görünen listeyle SINIRLI DEĞİL — Supabase'deki TÜM plan satırlarını siler.
  if(isAll){
    if(!confirm('DİKKAT: Supabase’deki BÜTÜN kontrol planları (tüm maddeler + tüm antetler) SİLİNECEK. Geri ALINAMAZ!\n(LeanSys’e dokunulmaz; yalnız buradaki veriler.)\n\nDevam?')) return;
    if(!confirm('SON ONAY: Gerçekten TÜM kontrol planlarını silmek istiyor musun? Bu işlem geri alınamaz.')) return;
    try{
      toast('Tüm planlar siliniyor… (biraz sürebilir, bekle)','ok');
      // Tüm kodları hafif view'den al (tek dev DELETE 100k satırda zaman aşımına uğruyordu)
      let codes=[], off=0;
      while(true){ const {data,error}=await sb.from('control_plan_list').select('stock_code').order('stock_code').range(off,off+999); if(error) throw error; if(!data||!data.length) break; codes=codes.concat(data.map(d=>d.stock_code)); if(data.length<1000) break; off+=1000; }
      // 100'erli parçalarla sil → zaman aşımı yok
      for(let i=0;i<codes.length;i+=100){ const chunk=codes.slice(i,i+100);
        const {error}=await sb.from('control_plan_items').delete().in('stock_code',chunk); if(error) throw error;
        await sb.from('control_plan_headers').delete().in('stock_code',chunk); }
      // kalan (view'de olmayan, ör. pasif) varsa son süpürme — artık çok az kaldı, hızlı
      await sb.from('control_plan_items').delete().not('stock_code','is',null);
      await sb.from('control_plan_headers').delete().not('stock_code','is',null);
      PLAN_SEL=null; PLAN_PENDING={};
      toast(`✅ Tüm kontrol planları silindi (${codes.length} plan).`,'ok'); await renderPlan();
    }catch(e){ toast('Silme hatası: '+esc(e.message||String(e)),'err'); }
    return;
  }
  codes=[...new Set((codes||[]).filter(Boolean))];
  if(!codes.length){ toast('Önce plan seç.','err'); return; }
  if(!confirm(`Seçilen ${codes.length} plan (maddeler + antet) silinecek. Geri alınamaz.\n(LeanSys’e dokunulmaz; yalnız buradaki veriler.)\n\nDevam?`)) return;
  try{
    let done=0;
    for(let i=0;i<codes.length;i+=100){
      const chunk=codes.slice(i,i+100);
      const {error}=await sb.from('control_plan_items').delete().in('stock_code',chunk);
      if(error) throw error;
      await sb.from('control_plan_headers').delete().in('stock_code',chunk);
      done+=chunk.length;
    }
    PLAN_SEL=null; PLAN_PENDING={};
    toast(`✅ ${done} plan silindi.`,'ok'); await renderPlan();
  }catch(e){ toast('Silme hatası: '+esc(e.message||String(e)),'err'); }
}

// ---- KONTROL PLANI VERSİYONLAMA / ARŞİV (canlı plana dokunmaz, JSON snapshot) ----
// iki plan sürümü arasındaki değişiklikleri (eklenen/çıkarılan/değişen madde) otomatik çıkarır
function planDiff(oldItems, newItems){
  const key=it=>(it.measure_name||'')+'|'+(it.op_no??'');
  const om={},nm={}; (oldItems||[]).forEach(it=>om[key(it)]=it); (newItems||[]).forEach(it=>nm[key(it)]=it);
  const fields=[['op_no','Op No'],['target','Hedef'],['lower_limit','Alt Limit'],['upper_limit','Üst Limit'],['unit','Birim'],['nitel_hedef','Nitel Hedef'],['method','Yöntem'],['sample_size','Örnekleme'],['sampling_frequency','Sıklık'],['son_kontrol_ornekleme','Son K. Örn.'],['process_control','Proses'],['giris_kalite','Giriş'],['final_control','Son'],['production_equipment','Üretim Ekipmanı'],['fmea_number','FMEA'],['special_characteristic','Özel Kar.'],['is_qualitative','Tip']];
  const norm=v=>(v==null||v===''||v===false)?'':(v===true?'✓':String(v));   // null/''/false eşdeğer; true=✓
  const added=[],removed=[],changed=[];
  Object.keys(nm).forEach(k=>{ const n=nm[k]; if(!om[k]){ added.push(n.measure_name||k); return; }
    const o=om[k],ch=[]; fields.forEach(([f,lbl])=>{ const ov=norm(o[f]),nv=norm(n[f]); if(ov!==nv) ch.push(lbl+': '+(ov===''?'∅':ov)+'→'+(nv===''?'∅':nv)); });
    if(ch.length) changed.push((n.measure_name||k)+' ['+ch.join(', ')+']'); });
  Object.keys(om).forEach(k=>{ if(!nm[k]) removed.push(om[k].measure_name||k); });
  return {added,removed,changed};
}
function planDiffText(d){
  const p=[];
  if(d.added.length) p.push('➕ Eklenen ('+d.added.length+'): '+d.added.join(', '));
  if(d.removed.length) p.push('➖ Çıkarılan ('+d.removed.length+'): '+d.removed.join(', '));
  if(d.changed.length) p.push('✏️ Değişen ('+d.changed.length+'): '+d.changed.join(' · '));
  return p.length?p.join('\n'):'Değişiklik tespit edilmedi.';
}
